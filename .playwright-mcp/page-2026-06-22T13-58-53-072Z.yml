                  - text: 圓。日本「角」威士忌、Rum酒、Gin酒，喝起來感覺像吃湯圓那些薑汁糖水。 酒吧只有一個窗，朝外看，可以看見正對面有另一家酒吧。那是和尚吧，和尚經營的酒吧。牧師說他與對面的和尚是好朋友，也許會相約一起看《聖☆哥傳》。 對面，一個醉得不省人事的女孩趴在窗框睡着。我擔心她會不會掉下去，或者吐下去。兩者俱不幸。 這時候來了一個客人。一個男生。一上來就要啤酒。他和其餘三個朋友辦一個項目，叫做「牧師企劃」，每三到四個月一次，拉中村透去各種奇怪的地方講道，包括海邊、溫泉酒店，還有富士山下的自殺勝地青木原樹海。但這客人說他不是基督徒，四個搞手都不是。我問他，不是基督徒何苦要搞甚麼「牧師企劃」，他想了半秒，舉起手指頭說：「因為透SAN是我們的玩具。」 對面和尚吧的醉酒女仍在睡。 這天遇到的最後一個來客，是在東京大學讀碩士的學生。知道我是香港人，一連請了我飲三杯酒。我對他講了很多反送中，說我今早才做了香港遊行facebook live。他對我講了很多參議院選舉，說投票率何其低，日本人何其不關心政治。他先走，然後我也走了。時為日本時間11點半左右。我進新宿站，我的立場新聞同事就在另一個站被打。白衣大漢一棒一棒打在一個女孩子身上。透過直播你可以清楚看見他朝鏡頭直奔，可以聽到我同事呼叫。一把男聲若隱若現：「記者，唔好打記者。」我也是記者，而我在新宿歌舞伎町剛喝完滿滿一肚子酒，半醉回家。如果有神，這神真夠他媽的幽默。 接下來一星期，我寫了好多文章，追究警暴，追究黑警勾結。有時寫到一半會流馬尿，但流出來的量遠遠不及喝下去的酒。下個星期
                  - mark [ref=e925]: 日
                  - text: 。跳過啤酒，直入牧師Highball。 「中村SAN。我問你，你會不會有憎恨人的時候？」 「有時吧。」 「譬如說？」 「有些客人喝醉酒甚麼的，麻煩到其他客，我會趕他走的喔。」 「這不是憎恨吧。」 「也對，只是為了守住店子。」 「一個正常人，看到不合理、不公義的事，是會憤怒的對吧？牧師會怎樣做？」 「想憤怒就憤怒，這是理所當然的。人有感情嘛，強行抑壓下去不是好事。」 「神會怎麼想？」 「神啊。」牧師雙手抱胸。「《聖經》沒有說不可憤怒。只是，就算憤怒，也還是要寬恕。我覺得嘛，可以生氣，但最好不要生太久。你生氣，對方又不痛不癢，受害的只是自己。所以，盡快忘記，盡快原諒。神也是這樣想的。」 「有不可原諒的人嗎？」 「不可原諒的人……」 「譬如胡亂打人的警察……京都動畫謀殺案不是死了35人嗎。難道你要說﹕『好，原諒你了～』這樣。不會很難受嗎。」 「動畫的事我不懂，要是有家人在裏面工作，因而被殺，那可真是憤怒啊。」 「原諒，不是很難嗎。」 「難啊。」融解的冰塊發出不大清趣的碰撞聲。 「難啊。」我說。 「難。」 我喝酒。 「中村SAN，你讀了七年神學，有沒有問題是《聖經》解決不了的？」 「這個嘛……因為基督徒與神有連繫，神會救你。遇上解決不了的問題，你就祈禱，聽神的話。雖則這和神學沒甚麼關係，是性格問題。」 「若說性格，從無神論者變成牧師不是很難嗎？」 「這也是神的力量。《聖經》有這樣的話，『不是你們揀選了我，是我揀選了你們』。不是我努力學習令自己相信神，而是神揀選了我。」 「唔……」轉瞬又喝下半杯牧師Highball。今天的酒稍嫌不夠辣。 「那為甚麼神不揀選我呢？」 「因為你是壞人吧？」 「或許。」 「這是說笑。不過，你不是說自己以前是基督徒嗎？可能還會回去，誰知道呢？信我，神有認真考慮你的事。」 我喝酒。 「中村SAN。」 「甚麼？」 「教你。香港近年有個字很流行，叫『基督儍瓜』。」 「『基督儍瓜』啊。中文怎麼說？」 「耶撚。」 「耶撚﹗」他學着說，並多次重複。「耶撚﹗耶撚﹗耶撚﹗」他拿出白紙來問我有沒有漢字，我就寫出來。 「如有香港人，記得要給他們看。」 「耶撚是甚麼意思？」 「有些人，信耶穌信過頭，將天下間所有問題都推給耶穌解決，那就是耶撚。」他笑了。 酒吧大門掛的鈴叮叮噹噹響，進來三個中國學生。牧師說：「第一次有四個中國人。」我想，看在耶穌份上，算。三個人點了飲料之後，牧師現學現賣：「我剛學會了一個字。耶撚！」聽得三個中國人黑人問號。牧師以為問題在自己發音不準，又拿出我剛題的字來炫耀。黑人問號更大了。 「那是廣東話啦。香港人說廣東話，中國人說普通話。香港人不同中國人。」我說。 又來了一個客。是個中年女人，頭
