                  - text: 引言 根據牛津英語字典，「romance」一詞未必指向愛情。它亦可解作： 以下，我想向你呈現 數學在這種意義上的浪漫 。 這任務無疑十分艱難，因為大眾通常認為數學枯橾乏味、艱澀難懂。而這印象，多半基於學生時代對數學功課和考試的痛苦回憶。數學和浪漫，看似風馬牛不相及。 但奇怪是縱觀世界各地，在大學裡總有一批數學系教授和學生，全心全意投入數學。他們之所以如此，絕非為賺錢，而是由衷覺得數學很有趣、很美。 數學的魅力簡直無遠弗屆 。 不同人對數學的觀感為何會有如此落差？部分原因，是天分：天分高者，從小對數學駕輕就熟，自然容易樂在其中。求學時的經歷，或許也有關：有些人幸得良師指點，因而熱衷數學。然而，我認為有一個更主要的外在因素： 就是對於「甚麼是數學」的認知。 單刀直入，如果你至今接觸數學的渠道只限於傳統的數學課，那請先拋棄對數學的固有印象。 中小學所教的，絕大多只是「計算」。 解方程式、計面積體積、排列組合、或 sin cos tan 之類，盡是計算。但事實上， 計算只是數學世界一個極狹窄的側面。 所以大部分人所接受的數學教育只有如坐井觀天。再者，計算的步驟複雜繁瑣，題目又丟鑽，覺得枯燥乏味實在是人之常情。 假如你向來對數學心存芥蒂，希望以上解釋能令你稍為放開戒備。 好，既然「計算」不算數， 那究竟甚麼是真正數學？ 這問題浩瀚無垠，不易解釋，需慢慢來。本文分為甲乙丙三大部分： 正式開始前還需補充三點。 第一，本文目標對象是一般大眾，所以預備知識方面，你僅需具備自中學時期殘留對數學的依稀印象。然而正因如此，對於熟悉數學的同道中人，本文囉囉嗦嗦所言皆是老生常談，或是大家心照不宣對數學的普遍描述；請勿見怪。 第二，本文將 較為客觀 地談數學的浪漫。讀畢後你是否喜歡數學，還要視乎各人口味，因為「喜歡」是 主觀 的。正如李白的詩是狂放，畢加索的畫是抽象，都是客觀描述。你喜不喜歡，則適隨尊便。 第三，筆者僅是一名正修讀數學的博士生，對數學的領會定然未算十分深刻。我只能盡力而為，寫下這刻我對數學的理解和感受。 首先簡介數學的各範疇。 數論 (Number theory) ：始於過二千年前，是最古老的數學分支之一，起源於研究數目字（即 1, 2, 3,
                  - mark [ref=e821]: "4"
                  - text: ", 5, … ）的特質。我們從小學開始學的：公因數、最小公倍數、整除性、質數等，皆屬於數論。 幾何 (Geometry) ：始於過二千年前，同樣是最古老的分支之一，起源於研究圖形、立體、長度面積體積。畢氏定理、三角函數 sin cos tan、圓周率 π 等，皆屬幾何學。 代數 (Algebra) ：始於過二千年前，同樣是古老。最初是圍繞解方程式。我們中學所接觸的方程組 x + y = 17 2 x – y = 7 或二次方程 z ² – 10 z + 24 = 0 等，皆屬於代數領域。 分析 (Analysis) ：始於十七世紀，其起源是牛頓創造微積分。而往後在十八、十九世紀，數學家逐漸將「無限」、「極限」等概念嚴格地定義，並為牛頓的微積分補上堅實的理論基礎。 集合論和邏輯 (Set theory and logic) ：始於十九世紀。現代數學以其嚴謹的邏輯著稱，因此邏輯學可謂數學的基石。而最基礎的邏輯學其實始於常識。 拓撲 (Topology) ：始於十九世紀。大眾對這個比較陌生。其中一類易懂的拓撲學問題是將繩結（knot）分類。例如問：以下兩個繩結是否一樣？即是問，可否不剪斷繩子，而將第一個結變成第二個結？（答案：否） 其他 ：現代數學的分支繁多，難以簡單地全面分類。不在上列的還有組合論 (combinatorics)、圖論 (graph theory)、概率論 (probability theory)、博弈論(game theory) 等等。 以上只是非常模糊的分類，實際上不同的數學範疇之間充滿錯縱複雜的關連，沒有清晰邊界。例如，我們有代數拓撲 (algebraic topology)、微分幾何 (differential geometry) 、幾何分析 (geometric analysis) 等跨領域的分支。 我將分以下五部分談數學。 ＊號愈多，內容愈難。 而在每一部分，我也將扣緊文題「數學的浪漫」。 記得， 你所預期的浪漫應是 「a feeling or sense of wonder, mystery, and remoteness from everyday life 」。 讓我從一個具體例子談起。大家在中學肯定學過以下定理。 例如當 a = 3 厘米， b ="
                  - mark [ref=e822]: "4"
                  - text: 厘米，那麼由畢氏定理可知 c ² = 3² + 4² = 25 所以 c = 5 厘米。這應該不難理解。 畢氏定理是以 公元前五世紀 在古希臘的畢氏學派命名，並被記載在 Euclid（歐幾里德）的《幾何原本》中。但依我看來，這功勞大概不應由畢氏獨攬。因為同一時期，在 公元前三世紀 的西漢末年，《周髀算經》成書，當中便記述了前人以解 a ² + b ² = c ² 的方法來求得直角三角形邊長。引錄原文： 這段字，你讀起來可能半懂不懂。但其實只要串合「自乘」、「并之」、「開方」等詞，它正正是 a ² + b ² = c ²。 希臘和中國，這兩個分別位於歐亞大陸東西兩端的古老國度，文化有天壤之別。在那通訊隔絕的時代，兩邊竟然不約而同都有人獨力發展出這幾何學的奠基定理， 可見數學知識在古代已跨越地域界限。 此外， 數學知識更能跨愈古今界限。 原因是， 一旦某數學定理被證明為真，它便從始為真，永不改變。 所以不出所料，創於二千年前的畢氏定理，時至今日，仍舊寫在每本基礎幾何學的書中。不單如此，那本《幾何原本》裡每一道幾何定理， 只要是附上了嚴格證明，便必然至今仍正確無誤。 這是數學的獨特性：其絕對真確性讓其他科學或人文學科望塵莫及。 舉例，在古希臘時代，流行 Ptolemy 的「地心說」。地心說認為，宇宙萬物（包括太陽、太陽系的行星、和其他所有恒星等）皆以地球為中心，圍繞運動。此外，還流行 Plato 的「四元素說」。他認為，世間一切物質皆由火、水、土、氣四種元素構成。 這兩個理論在今天看來當然錯得離譜。但在那缺乏科學觀測技術的年代，古希臘的哲學家嘗試 直觀地 解釋眼前所見的自然現象，實在是無可厚非。事實上，「地球圍繞太陽公轉」的說法是到十七世紀伽利略以後才被廣泛承認， 「
                  - mark [ref=e823]: 日
                  - text: 心說」終於取代「地心說」。 而所謂的四元素，則隨著真正的元素（如氧氮氧金銀銅等）被發現而褪去。 在十九世紀，現代的「元素周期表」終於誕生。 由此可見，古代的 天文學 和 化學 理論均已在科學進步中被淘汰，更遑論古代醫學、心理學、生物學等了。 反觀我們的畢氏定理，不管世界在這二千年間翻天覆地的劇變，仍能乞立不倒。而 Euclid 那十三冊幾何原本，經歷無數前人的試練，依舊在基礎幾何學中堅守一席位。如此看來，無堅不摧的數學實在分外可貴。 這第 1 部分拋磚引玉，帶出一個問題： 數學為甚麼能跨越時空，永恆為真？ 為解答這疑問，我將用第 2 部分作舖墊，解釋人類文明累積了二千年的數學知識，是以甚麼形式存在。完滿的解答將在第 5 部分。 第 1 部分小結：數學知識的真確性跨越時間和空間。 數學有三個重要組成部分： 定義、證明、和定理。首先要定義一些數學概念，然後進行嚴謹的證明，從而獲得數學定理。 讓我舉一例。以下是一個 定理 ： 例如 3 和 5 是單數，所以 3×5，等於 15，也是單數。這是一個簡單的數論 定理 。但首先，我們必須釐清相關 定義 ：例如甚麼是「單數」？甚麼是「乘以」？ 你或許想：多餘！這也要問？其實，我想展示的，是數學的精神： 所有概念都必須毫不含糊，賦予準確定義。否則，建基於此的推論便會隨之變得脆弱、邏輯不清。數學講求嚴謹，因此粗疏的定義和論證皆是致命傷。 回想起我讀大學本科時，學校規定要修幾門通識課。當時我選了一個關於印度經典文學的。有次堂上討論，教授不停提到「梵」這概念，而閱讀文本裡也頻頻出現「梵」。講到中途忽有一個同學發問：「究竟『梵』是甚麼？」教授頓一頓，笑笑口答：「啊⋯⋯這個不好說，不好說⋯⋯」他之後雖有補充幾句，但始終沒有清晰回答。不用說，我也是聽得迷迷糊糊。 我舉這例並非要貶低其他學科，而是要帶出數學定義絕不會這般含混。 回到單數的定義。其實這只是小學數學。 留意重要一點：定義 (3) 牽涉「整數」和「除盡」兩概念。因此，我們可繼續追問這兩者的定義。 甚麼是「整數」？甚麼是「除盡」？ 這是數學另一大特徵： 數學幾乎所有的定義、證明、定理，都是層層疊疊，一個建基於一個的。 換句話，面對每一個數學定義，我們都必能溯源追流，由淺入深理解其意義。譬如，就「除盡」一詞，它的意義建基於「除法」，「除法」又建基於「乘法」，「乘法」又建於「加法」。 為了更傳神地說明此現象，我上維基百科選了一個名詞：「黎曼流形」。這是微分幾何學的概念，大概屬於研究院程度。我逐字逐句從維基百科複製，以下是其定義： 現在清楚何謂黎曼流形了吧？ 你肯定茫無頭緒，因為你跟本不知道何謂「微分流形」、「切空間」、「點積」等。但維基百科的優點，是當讀者看見語意不明的詞語，可以點擊這些詞查看其意思。甚至可繼而逐頁深究下去，打破沙盆問到篤。我們一於放膽一試吧！不過放心，以下這一連串定義 你 感受一下即可 ， 絕不需細讀 。例如，點擊「微分流形」，便出現以下定義： 仍然不懂。何謂「光滑結構」和「拓撲流形」？點進後者一看： 嘩，甚麼來的。硬著頭皮，隨便選個「歐幾里得空間」按進去： 不如再按「實數體」看看？ 開始有些熟悉了。它提到所有小數，如3、3.1、3.14等等都屬於實數。不如繼續按下去，看看何謂「有理數」？ 好複雜。咦？有沒有發現，在第一句又提到「整數」了，是跟我們定義 (3) 中一樣的名詞！而且當中也出現了「加法」「乘法」等詞。由此可見，簡單如「單數」，複雜如「黎曼流形」， 其定義都是從最基礎的概念構築而成：例如「整數」，「加法」，「乘法」等。 頭暈轉向地兜了個大圈，我希望你至少看清：數學很難，其中一個難點，是其 高深複雜的定義。 回顧剛才一例，由「黎曼流形」向下追溯至「整數」，一共經過六層的定義。而且他們不是「一個建基於一個」的關係，而是「一個建基於幾個」。粗略估算，如果每層下面是由兩個定義承托，那總共已經有2×2×2×2×2×2個，即是64個定義了。再者，對於讀數學的人，只是「知道」一堆定義是遠不足夠： 我們更要「理解」這些定義的深意。因此學習數學是極費時間的。 普林斯頓大學數學家 Jacob Lurie 有以下生動的描述： 所謂「very long operating manual」，就是說理解現代數學，需要海量預備知識。當中便包括要掌握相當部分的數學術語。 順帶一提，雖然「整數」「加法」「乘法」這些概念大部分人都瞭如指掌，但他們的嚴格定義牽涉一些技術性的細節，實在不好解釋。所以我將不再周旋下去，關於數學定義的討論到此為止。 或許有人會質疑：這般架牀疊屋，無中生有地定義了一大堆數學概念，豈不是天下本無事 ，庸人自擾之？其實不然，因為定義只是第一步。這有如我們最初學英文時，必須先熟習一些詞彙的定義，繼而以之編寫有意思的句子。數學亦如此。 某程度上，數學也是一種語言。定義的存在，是為了寫下數學定理及其證明。 何謂數學定理？簡言之，就是 有關數學概念的命題 。舉例，還記得以下定理？ 它陳述了一個單數和乘法之間的簡單關係。 以下是另一定理： 它陳述甚麼，你肯定不明所以，因為你不懂當中的術語。不過細心的讀者會發現，「拓撲流形」一詞其實已曾出現於定義 (7)，並非常人能理解。而不出所料，「單連通」、「封閉」和「同胚」等詞的定義都各有千秋：大約是大學數學三四年級的內容。而定理 (10) 則在說這些定義間的一個關係。 數學定理皆是命題，正如定理 (2。是一道命題。但要確認它為正確，便需靠嚴格的 數學證明 。 何謂「證明」，因學科而異。舉例，法律上證明某人有罪，需要人證物證動機等。歷史學上的證明，要翻查古籍文獻或實地考察。天文學的證明，則常透過望遠鏡觀測天體，配合電腦模型分析數據。 數學證明，則純粹依靠邏輯推論。 何謂純粹的邏輯論證？其確切意思我將在第 5 部分解釋。這刻為免紙上談兵，我應從一個具體例子著手說明。我因而寫了一個對定理 (2) 的證明，在附錄一，感興趣的讀者可去瞧瞧。 跟數學定義一樣， 數學的定理和其證明都是一層一層建築而成。 記得我中學老師曾說：讀數學跟讀歷史不同。比如這陣子你讀唐朝歷史。讀不熟，人物關係記不清，沒關係，下星期讀宋朝重新開始。但數學不同，是要累積的。加法學不好，便不能學乘法；平面幾何學不好，便不能學立體幾何。 容我說得更直白點：假如你看不明白附錄一中對定理 (2) 的證明，很可能是因為不諳代數運算規則。譬如，該證明用上以下定理。 如果你不知道這定理，自然看不懂定理 (2) 的證明。換言之， 定理 (2) 是建基於定理 (11) 的。 這吻合數學知識的普遍特徵。下至中小學，上至大學研究院，以至現代數學的疆域，皆如此： 數學知識是層層遞進，由基礎逐步建築而成的。 尤記得。2.1 部分我們挑選了「黎曼流形」一詞，然後剖心掏肺地翻起它之下一連串的定義。數學定理的情況如出一徹： 證明一個高等數學定理往往需引用幾十甚至上百個「較低層」的定理 ，而這些定理的證明又各自建於「更低層」定理。就如一棵百年古樹的老根向地㡳蔓延，結出無比複雜的網絡。若以蠻力夾生連根拔起，則可一睹底下無數分支。 不過順帶一提，嚴格來說這比喻不盡貼切。因為當針對一個數學定理查根究底，將不會如樹根般愈往下愈鬆散並最後中斷，反而將 被導向一塊堅實的基石：那是甲部曾述的集合論和邏輯學。 （這將在第 5 部分詳述） 題外話，「層層堆疊」這特色，普遍適用於數學和科學知識；相反，人文學科的知識則較小符合此特徵。以藝術為例， 古往今來的藝術家的成就，都是能夠獨自成立的。 你極其量只能說某人對後世作品的風格有間接影響，但絕不存在後者建立於前者的從屬關係。在藝術館看油畫，沒規定要順序先看文藝復興時期的，再看浪漫主義的，然後看印象派的，最後看現代的。我甚至敢斷言：即使將十七八世紀的油畫一舉抹去，十九世紀梵高、莫奈的畫將依舊驚艷，受世人青睞。反觀，假若將十九世紀的數學全部抹殺，那二十世紀的數學將淪為空中樓閣，不知如何解讀。 總言之，一個數學定理之所以成立，是 因為有一個嚴格的證明。 數學證明必須嚴格無誤，有根有據。它們往往環環相扣，層層疊疊。 當有任何定義、概念、定理寫得含混不清，模稜兩可，便有損論證的嚴謹性。只要有一步失去邏輯性，牽一
