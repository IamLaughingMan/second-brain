                    - text: 蒼蒼的被告 一次令人錯愕的嚴厲判刑
              - generic [ref=e473]:
                - generic [ref=e474]: 立場新聞
                - paragraph [ref=e475]: 2021/04/16
              - paragraph [ref=e476]:
                - generic [ref=e477]:
                  - text: 2021 年
                  - mark [ref=e478]: "4"
                  - text: 月 16
                  - mark [ref=e479]: 日
                  - text: 下午，西九龍裁判法院第一庭。法官胡雅文宣判，當
                  - mark [ref=e480]: 日
                  - text: 九名被告帶領遊行的行為，明顯挑戰警權、法律和秩序，判監是唯一合適刑罰，判處黎智英、李柱銘、吳靄儀、梁國雄、李卓人、何秀蘭、何俊仁、區諾軒、梁耀忠，分別監禁 8 至 18 個月不等，其中只有
                  - mark [ref=e481]: "4"
                  - text: 人獲准緩刑，5 人即時入獄。 寂靜的法庭空間內，眾人原本屏息靜氣等待宣判，聞法官說第一項控罪以 18 個月為量刑起點，公眾席上譁然。 法官逐一宣布刑期，指出考慮到哪位被告年老、哪位被告選擇認罪、哪位被告畢生服務社群，可酌量扣減刑期…九名被告，八位是頭
                  - mark [ref=e482]: 髮
                  - text: 灰白的老人，神情依然平靜，李柱銘一直低著頭，偶爾調整耳機。被處即時入獄 12 個月的李卓人，拉下口罩，喝了一口水。一名年輕的女律師開始哭泣。 一切塵埃落定，獲准步出被告欄的被告，和首次還押的李卓人、何秀蘭緊緊擁抱，本坐在被告欄外的李柱銘，趕緊在懲教人員關門前，伸手和他緊緊一握。何秀蘭手上還有書，連忙叫住朋友幫她保管。 公眾席上的民陣召集人陳皓桓，率先向他的前輩高呼：「多謝各位！辛苦各位！」其他人趕忙緊隨，庭內響起一片「阿人頂住呀！「Cyd 頂住！」「加油，保重！」之聲。李卓人雙眼通紅，踏入羈留室前高舉雙手及五一手勢。 散庭，眉頭一直緊皺的吳靄儀步出被告欄，捉著一名年輕律師手臂，「咁樣 sentence 唔啱」，她用盡力捉著，重複了一遍又一遍，「咁樣 sentence 唔啱。」 * * * 早上開庭前，庭內外擠滿民主派的熟悉面孔，在聊天、說笑、或因疫情碰肘問好，氣氛貌似輕鬆如常。 進入被告欄前，李卓人走上律師席，和代表律師互緊握拳頭打氣，何秀蘭與戴啟思談話、拍拍他的肩膀，又逐一和梁家傑、李志喜等朋友緊緊擁抱道別。穿著深藍色格子西裝與「懶佬鞋」的李柱銘，坐在庭外一角和陳
                  - mark [ref=e483]: 日
                  - text: 君交頭接耳；穿著白襯衫、戴著絲巾的吳靄儀，則獨自倚在被告欄前，不發一言。 因國安法還押的黎智英被懲教人員帶到被告欄時，彼此也像平常般道早安；惟獨是梁國雄被帶出來時，高呼「和平集會無罪！政治檢控可恥！」，彷彿才提醒大家這次碰頭的本質。 控方外聘大律師盤起
                  - mark [ref=e484]: 髮
                  - text: 髻，戴上假
                  - mark [ref=e485]: 髮
                  - text: ，準備開庭。 「篤、篤、篤」，隨著響亮的
                  - mark [ref=e486]: 敲
                  - text: 門聲，眾人起立向法官鞠躬，8.18 案終進入最後階段。甫開庭，法官胡雅文向律師表明，期望每位被告花不多於 30 分鐘進行求情，以便能於同日下午判刑。 按照順序，首先是代表黎智英的資深大律師余若薇求情，緊接是同時代表李卓人及何秀蘭的戴啟思。 余若薇指，818 當
                  - mark [ref=e487]: 日
                  - text: 眾多市民是因為合法的集會而前往維園，黎智英當
                  - mark [ref=e488]: 日
                  - text: 僅僅是行使受憲法保障的和平集會權利，加上他在案中角色非積極，判處監禁會是不合比例的刑罰。戴啟思求情時則列舉，李卓人及何秀蘭均是前立法會議員，尤其關注勞工、基層、性小眾議題，大半生為香港服務。 余若薇及戴啟思又認為，控方所依賴的周庭及黃之鋒 6.21 包圍警總等案，與本案所涉暴力程度有異，故懇請法庭參考 2019 年前多宗未經批准集結案，以罰款或簽保守行為處理，不應判處監禁。 接着第三位求情的是吳靄儀，但代表她的資深大律師何沛謙表示，吳靄儀解聘了律師，並希望親自向法庭作出陳詞。 胡雅文聽罷向何沛謙表示，她並非批評被告借機發表演說，但強調現階段應為聽取求情，及與罪行有關的事情。何沛謙遂解釋，吳靄儀的陳詞將會是會有關她自己、工作及對法治看法的陳述，最適宜由她本人自述，終獲胡雅文批准。 吳靄儀在被告欄中站起來，輕輕調整咪高峰，請求胡官批准她
                  - mark [ref=e489]: 脫
                  - text: 去口罩。她右手持著英文講稿，隔著玻璃開始徐徐朗讀。 吳靄儀談及，自己 1981 年在英國劍橋大學修讀法律，當年正值中英就香港 1997 問題，草擬聯合聲明的關鍵幾年，她回港後，先加入新聞工作，1990 年正式投身法律界，並於 1995 年，循法律界功能組別加入立法會，前後擔任立法會議員一共 18 年。 吳指， 18 年來，自己一直盡力守護法治，當人民權利被侵犯，就要強硬回應，一如 1997 吳嘉玲案後人大首次釋法，法律界超過 600 人發起靜默遊行抗議。她強調，法律應該是保障，而非奪去人民權利，亦只有這樣才可贏取市民對政府的信任。 她又引述美國最高法院法官 Anthony Kennedy 1999 年在香港發表的一番話，指司法獨立其一必要條件，是法官必須擁有保障市民自由所需的司法權，而這是至關重要的，「如果大律師和社會對過於狹窄的司法權漠不關心，司法機構則可能成為剝奪人民自由的幫兇（ because if the bar and the society seem indifferent to a too-narrow judicial charter, there is a risk that the judiciary will in fact or perception aid and abet a larger scheme to deprive persons of their liberty. ）。」 吳靄儀續道，Kennedy 的話非常嚴厲，並旨在點出法律專業應對維護司法獨立忠心如一，而且，「... 維護司法獨立並非為了保障法官的利益，而是為了確保法官能夠無畏無懼地捍衛法治。（to say that the defense of judicial independence is not for the benefit of judges themselves, but so that they can be in a position fearlessly to uphold the rule of law）」 聽到這裡，有律師在席上一邊抄寫筆記，一邊不禁點頭。 胡雅文時而低頭抄寫，時而抬頭，定睛看著吳靄儀。陳詞完畢，公眾席響起掌聲。 及後休庭期間，有來聲援、坐在法庭大堂的女士熱情拉著吳靄儀問：「你聽唔聽到我哋拍手掌？我哋出面拍得好大聲！」。未料在立法會、法庭公開演說幾十年的吳靄儀，卻說：「梗係聽唔到！我求先驚到隻嘢咁！幾驚佢唔俾我讀落去！」 吳靄儀之後，輪到代表梁國雄的資深大律師潘熙陳詞。潘熙重提 2005 年的終審法院「梁國雄案」，亦即本案控辯雙方均有依賴的經典案例，他當年正代表案中其中一名被告，已嘗試點出《公安條例》下未經批准集結罪，最高 5 年監禁刑罰太重。 潘熙續指，雖然當年案件敗訴，但終審法院於判詞中表明，未經批准集結罪不設量刑指引，法庭應按照集結的時間、規模、擾亂社會的程度等因素，判處合適刑罰，5 年監禁只是在最差情況下可判處的最高刑罰，「明顯本案就不是最差的情況。」 潘熙又時而露出招牌笑容，再三強調， 若果法庭真的 打算判處各被告監禁，希望法庭能判處非監禁式刑罰；而 如果法庭真的 要判處監禁式刑罰，希望亦能為緩刑... 梁國雄多年來常聘請潘熙代理案件，不論是在刑事案中為他辯護，或在司法覆核案中代表他挑戰政府，諸如男囚犯剪
                  - mark [ref=e490]: 髮
                  - text: 司法覆核、《禁止蒙面法》覆核，到 47 人國安法案，二人相識起碼十數載，潘熙過往亦曾在梁國雄的書中撰文，談二人打官司的趣事。 陳詞後，潘熙轉身，向被告欄內的梁國雄比出一個「Okay」手勢。 排在最後求情的何俊仁及李柱銘，由資深大律師夏偉志代表陳詞。夏偉志指，何俊仁同李柱銘分別將近 70 和 83 歲，何俊仁 1977 年成為律師，及後開設專門服務公眾利益的律師樓，李柱銘則為名譽資深大律師，更是基本法起草委員之一，畢生以理性、平和方式爭取民主。 夏偉志指，在一個文明社會，不應該將人送入監獄，除非完全地別無選擇，而本案是有其他判刑選擇。他最後強調，兩人不只是有一般的良好品格，而是廣受人尊重，法庭若選擇鎖起兩位用一生服務社會的老年人，並不會帶來公義。 * * * 聽罷求情，法庭押後判刑，待黎智英下午兩宗同於西九龍裁判法院的案件提堂後再續。 法官胡雅文判刑時，引用黃之鋒「重奪公民廣場案」及周庭「 6.21 包圍警總案」等案例指，為維持公眾秩序，即使該非法集結並無涉及實質暴力，法庭判刑須合比例並具阻嚇性，案例亦無禁止法庭就不涉暴力的集結判處監禁。 胡雅文指，雖然 2019 年前的未經批准集結案例子大多是判處罰款，「但（當年）沒有一宗案的背景能與 2019 年的社會騷亂及動盪相提並論，」被告利用自身影響力帶領遊行，故即時監禁是本案唯一合適刑罰。胡雅文最終裁定兩項罪名分別以 15 至 18 個月、及 12 個月為量刑起點，考慮各被告年齡、健康及社會貢獻等情況後，作不同刑期扣減或准予緩刑。 審結，散庭。眾人似還在消化結果，未及反應，還是陳皓桓首先高呼：「多謝各位！辛苦各位」，及後多人緊接，打氣、道別、咒罵「政治打壓」聲此起彼落。 小休一回，隨即再開庭，繼續由胡雅文處理 8.31 遊行案，黎智英、李卓人及楊森的判刑。 離開法院時，獲判緩刑的何俊仁見記者，對法官量刑準則感驚訝、失望，又對其他被告須即時入獄感到非常痛心。 吳靄儀匆匆離開法庭，直接到大樓地庫停車場駕車離去。李柱銘步出法庭時被半百記者包圍，記者簇擁著拍照，他都一一配合，惟眉頭一直緊皺著，面對記者提問，他只輕輕舉手，始終未發一言，登上私家車離去。 文／梁凱澄
