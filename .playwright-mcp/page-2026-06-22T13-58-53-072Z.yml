                  - mark [ref=e769]: 髮
                  - text: 略略見灰，架着一副銀絲眼鏡，但最搶眼的，就是他那憨厚的笑容。 他是「深哥」，聞其名就知道他是這家老字號的掌門人。鐵閘轟地響了兩下，嚇得人心離，深哥卻施然走到門外查看，原來是貨送到。 他說，做食肆跟做人一樣，不昧良心，夜寂
                  - mark [ref=e770]: 敲
                  - text: 門何須畏？ 撰文：黃寶琳 攝影：胡浩賢 收音機的女聲正在報時，現在是早上七時正，大湯鍋內的開水已經沸騰着。雲吞麵鋪的開門第一件事，就是要煲湯，但如此一大鍋的湯，晚上關店離開前，就已經要開火燒水，待早上回來開店時再放材料。深哥忙於準備食材之時，嘴裏喃喃唸着，老店一九八二年開業，直到今日，麵湯都是沿用當年師傅傳授的秘方，半點不改，因為不想違背傳統。他跑到店外，把剛才的幾箱貨物搬到後倉，又打開其中一箱，取出一包食材來，一看，是一包大地魚乾。他把魚乾從包裝裏抽出來：「雲吞麵湯落大地魚係必然嘅，唔用大地魚嘅話，湯不成湯。」把魚乾放進鍋中，他嘆說坊間很多人都省了大地魚這成本，煲湯後就只用醬油調色，味道就差得遠了。 接着，把大堆豬骨倒進鍋內。湯骨用甚麼骨也有講究，老店堅持要用豬筒骨，而且有個宗旨，如果要做良心生意的話，千萬不要落豬頭骨。深哥當
                  - mark [ref=e771]: 日
                  - text: 年輕時也不懂，是一位老雲吞麵師傅告訴他，婦女生小孩後，誤吃豬頭骨會上風，女人因為喝了而上風，那麼就間接做了壞事。他銘記在心，並下令凡違規者一概革職。放入剩餘的材料後，就要靜候數小時，打開蓋子讓湯熬煮出味，要清澈見底，才稱得上一碗靚的雲吞麵湯。 做飲食行業的，哪有坐下來等待的時候？走出廚房，他又拿出了一些大地魚，做雲吞的話，要先把肉剝出來，再放到熱油裏炸至微焦及香味散發，然後用攪拌機攪碎，用來拌雲吞餡。落大地魚講求比例，不能太多或太少，太少無味；太多會苦。準備好大地魚粉，就把
                  - mark [ref=e772]: 脫
                  - text: 水後的蝦及豬肉混合起來。這又令他想起以前跟師傅做的時候，不會用完整的一隻蝦，如今年代不同，生活富足起來，就改用完整的蝦。每隻雲吞都要有少許豬肉，但不能放太多，要做到香而不膩。加入調味料後，就灑上大地魚粉，然後撈勻，撈餡要順時針，不然蝦及肉會散開，散了就起不了膠。 餡料做得好，還需要外皮及包功配合，他打哈哈：「皮一定要薄，面皮咁厚邊度好食㗎？」耍着嘴皮時，他的雙手沒有停過下來，一邊純熟地包起了一顆又一顆雲吞。對雲吞的大小眾說紛紜，他卻有自己的一套看法——兩口雲吞。他解釋，以前流行一口雲吞，但他認為太小的話只吃到麵皮，不夠過癮；現時很多人喜歡吃大雲吞，但根本不好吃，雲吞大顆如鯪魚球般，外面煮熟了，裏面未熟；到裏面熟了，外面就因過熟而變得粗糙了。看他包得輕鬆，卻不知道內裏功夫技巧如此講究：「表面上雲吞麵好好做，但都係功夫錢，樣樣都要功夫！」 的確，就連淥麵也講功架。深哥甚至覺得，做一碗好的雲吞麵，最難就是淥靚麵。麵的生熟程度要剛剛好，準確度要很高，差了半分鐘，一個麵就可以由活生生變成死沉沉。他記起以前做街邊檔，客人坐在遠處的話，麵淥九成熟，待樓面送到客人面前時，麵就最好吃；如果客人就坐在面前吃的話，麵淥九成九熟，立即吃。說時遲，抓起幾顆新鮮包好的雲吞，跑入麵檔，將雲吞丟到筲箕裏，放到滾湯內，隔一陣子再放入一個生麵，淥了淥再撈起反手放到湯碗內，加入一勺湯，灑上葱花，一碗雲吞麵就成了。捧着熱騰騰的麵放到桌上，二話不說就吃起麵來，沒花幾口就吃光了碗中物，剛剛好的雲吞麵，會令人不停地吃下去，一口氣就吃光。他說雲吞麵真正的吃法，先吃麵，再吃雲吞，最後飲一口湯，不得了。做了三十年的麵，他還是每日都要吃一碗，吃的是味道，也是一種緬懷。 聽深哥的口音，就知道他並不是香港出生。他記得那時候剛來香港，有人帶他到新填地街吃了一碗麵。雖然當時沒有錢吃雲吞麵，只叫了一碗淨麵，但在大陸沒有吃過雲吞麵的他，驚嘆這碗麵的美味，因為太喜歡，令他冒起了學煮雲吞麵的念頭，於是便入行。猶記起學師時，生活十分辛苦，又要被師傅罵，又要挨打，但磨練總算有價值，一年後，自立門戶，於街邊自個擺起檔來。在油麻地這一區打滾久了，被人收保護費、有人醉酒鬧事，甚麼事情都有發生過，這些刀光劍影都沒有令他退縮，反倒是「走鬼」這回事令他最苦惱：「開一檔佢就拉一檔，俾人捉到怕啦，嬲嬲哋就搬入地舖。」這倒好，穩定下來，一直到今。 當然了，有了地舖後，賣的東西自然增多，鵝腸、黑牛柏葉、炆羊腩等小菜，又有了生滾粥等，以配合不同客人的口味。雖然產品多了，但深哥沒有因此而變得馬虎，因為嘗過美味的感動後，對食物有了執着。他還是十分謙遜的，認為自己做的食物，比上不足，比下有餘。只是，他們的食物對得起這個價格，在這個行頭內，老店的麵算便宜了，一碗雲吞麵才二十多元而已，在砵蘭街不會找到這麼便宜的雲吞麵了：「做麵好低利潤，我但求做良心生意就算。」這一份心意，又有一個故事。 想當年最苦的日子，就是他剛偷渡來香港時。游水到了大嶼山，就在虛
                  - mark [ref=e773]: 脫
                  - text: 的時候，遇到了恩人。對方好心讓他休息，又給了他一碗白飯及十元車馬費，才得以活到今日，日子如此安樂。雖然直到現在，深哥都找不到恩人，還不了恩，但他從那時開始，立志不會做違背良心的事，並要回饋社會。這些話可不是說說而已，除了免費請一些幾十年的熟客吃麵外，他更揚言，如果有人來到油麻地肚子餓了，只要進店內說聲不方便，吃完就可隨便離開，更吩咐員工不能阻止人家離開。 他忽而記起，有一次有記者來「放蛇」，有一名醫生來吃麵，表示自己錢包不見了，深哥不但沒有發怒，更給了他五十元，記者當場愣住了，說香港竟然還有這種人，深哥卻失笑：「點會冇啊？香港人好有人情味㗎。」又有一次，店外對面的唐樓有個女生跳樓，數十人在看，就在女生跳的一刻，他跟另一個途人竟衝上前，兩個人把女生接住了。救了人令他傷到現在，但也令他不忘做了好事的喜悅：「我做人就係咁簡單，幫到人就開心，唔違背良心，做人唯利是圖係唔得㗎。」他指一指近門口處的男人，表示這是他的兒子，個性跟他很相似，也許是遺傳。 說起兒子，臉上也是喜悅。兒子中三開始跟着他做麵，到現在十多年了，已經可以獨立打理老店。深哥對他十分放心，更着他有機會就要把生意擴大，為了賺大錢倒不是，他坦言只是很單純地喜歡雲吞麵，認為有好東西為何不分享：「我六十幾歲啦，賺乜大錢？賺大錢就唔止賣二十幾蚊啦，大家認識我深仔記就夠啦。」所以他叮囑兒子做好本分，不能為賺錢只做遊客生意，要看重舊客，因為老店全靠熟客光顧才有今日。 回過神來，深哥已經站在企檔位置，應付着午市。其實他大可不做這些功夫，只是，他喜歡。跟街坊聊天好、做樓面好、包雲吞好，淥麵也好，反正沒有一件事，是違心而行。放下一碗麵，又是那一抹憨直的笑臉。● 深仔記 地址：油麻地砵蘭街65號地下 電話：2780 3768 營業時間：9am-
