              - generic [ref=e214]:
                - generic [ref=e215]: 蘋果日報
                - paragraph [ref=e216]: 2021/03/23
              - paragraph [ref=e217]:
                - generic [ref=e218]:
                  - mark [ref=e219]: 脫
                  - mark [ref=e220]: 髮
                  - text: 禿頭問題困擾不少男士， 成因大多與體內激素及基因遺傳有關 ，西醫和中醫亦各有說法。如果你們有留意，男性比女性更大機會有禿頭問題，在香港，當我們看見中年男人有禿頭問題時，都會稱這個現象為「 地中海 」。引致禿頭的原因人人都不同，包括壓力、營養攝取量、藥物影響等，不過當中最重要的成因，必定是受到體內激素和基因遺傳影響。 其中一個原因是受到體內激素 睾酮 （testosterone）影響，我們的體內有一種酶，把睾酮轉化稱為二氫睾酮（dihydrotestosterone）的物質。二氫睾酮會令到毛囊的血液和營養供應減少，使毛囊縮小，隨着卵泡縮小，生長周期越來越短，新的毛
                  - mark [ref=e221]: 髮
                  - text: 就會變得更細，最終停止產生毛
                  - mark [ref=e222]: 髮
                  - text: 。這個現象會從頭皮的頂部開始，然後向下移動，最終導致「地中海」的現象。 都市流傳男性有更高濃度的睾酮，禿頭的機會亦會更高，其實這說法是錯的。
                  - mark [ref=e223]: 脱
                  - mark [ref=e224]: 髮
                  - text: 的真正原因，是因為禿頭男仕的毛囊對二氫酮更敏感，導到毛囊停止產生毛
                  - mark [ref=e225]: 髮
                  - text: 。換句話說，無論是否有
                  - mark [ref=e226]: 脫
                  - mark [ref=e227]: 髮
                  - text: 危機，大家體內的睾酮量都是差不多。 人的細胞內總共有23對的染色體，當中有63組基因都會令到身體出現
                  - mark [ref=e228]: 脫
                  - mark [ref=e229]: 髮
                  - text: 現象。科學家指，因為多組基因引致一個結果的情況為多基因性（Polygentic）。在63組基因之中，有6個是來自「X」染色體。 在「X」染色體裏的Xq11–12，與雄激素受體有關的基因，對人體是否禿頭有很大的影響。外國有一個大型的研究，檢查了12,806位帶有歐洲血統的男性是否帶有Xq11–12的基因，並了解其
                  - mark [ref=e230]: 脫
                  - mark [ref=e231]: 髮
                  - text: 程度。結果發現帶有該基因的男人，比沒有該基因的男人出現禿頭情的機會高出兩倍。另外，因為「X」染色體都是來自父親，所以亦都證明禿頭是遺傳的。在2017年的 另一個研究 中，80%有禿頭情況的受訪者的父親亦是禿頭的。 如果你懷疑自己有禿頭現象，記得保持心境開朗、減少自己的壓力，或者有更加均衡的飲食，都對頭
                  - mark [ref=e232]: 髮
                  - text: 健康有正面的影響。 雄激素
                  - mark [ref=e233]: 脫
                  - mark [ref=e234]: 髮
                  - text: 或稱為男性型
                  - mark [ref=e235]: 脫
                  - mark [ref=e236]: 髮
                  - text: ，大部份均為基因遺傳，皮膚科專科醫生胡惠福指男女均有機會擁有
                  - mark [ref=e237]: 脫
                  - mark [ref=e238]: 髮
                  - text: 基因，「
                  - mark [ref=e239]: 脫
                  - mark [ref=e240]: 髮
                  - text: 的基因可以遺傳給兒子或女兒；而該基因除了遺傳自爸爸外，也可以遺傳自媽媽。」 遺傳基因會導致頭皮的毛囊對男性荷爾蒙較為敏感，因而造成雄激素
                  - mark [ref=e241]: 脫
                  - mark [ref=e242]: 髮
                  - text: 。雖然女性都有機會遺傳
                  - mark [ref=e243]: 脫
                  - mark [ref=e244]: 髮
                  - text: 基因，但女性的男性荷爾蒙較少，所以出現雄激素
                  - mark [ref=e245]: 脫
                  - mark [ref=e246]: 髮
                  - text: 的機會亦較低。 坊間有不少頭
                  - mark [ref=e247]: 髮
                  - text: 基因測試服務，聲稱可檢測用家有否
                  - mark [ref=e248]: 脫
                  - mark [ref=e249]: 髮
                  - text: 基因，但胡惠福醫生不建議市民進行這些測試，「這類測試多以口腔拭子、唾液檢查來篩選出毛
                  - mark [ref=e250]: 髮
                  - text: 關聯遺傳因子，從而判斷病人是否有雄激素
                  - mark [ref=e251]: 脫
                  - mark [ref=e252]: 髮
                  - text: 風險，但這項技術現時仍然未成熟和可靠。」胡惠福醫生指這類測試結果並非100%準確，報告結果亦不一定反映現實，「就算檢測報告屬陽性（即有
                  - mark [ref=e253]: 脫
                  - mark [ref=e254]: 髮
                  - text: 遺傳基因），也不一定會出現早年
                  - mark [ref=e255]: 脫
                  - mark [ref=e256]: 髮
                  - text: 。
                  - mark [ref=e257]: 脫
                  - mark [ref=e258]: 髮
                  - text: 的成因複雜繁多，遺傳基因只佔一部份，還要配合後天或環境因素，例如營養不良及精神壓力，才會誘發
                  - mark [ref=e259]: 脫
                  - mark [ref=e260]: 髮
                  - text: 問題。反之亦然，報告結果呈陰性，亦不等於一定不會
                  - mark [ref=e261]: 脫
                  - mark [ref=e262]: 髮
                  - text: 。」 如受遺傳影響，胡惠福醫生指病人一般由20多歲開始病發，如果想知自己是否開始
                  - mark [ref=e263]: 脫
                  - mark [ref=e264]: 髮
                  - text: ，肉眼觀察最實際，「病人可觀察
                  - mark [ref=e265]: 髮
                  - text: 線有否上移、有否出現M字額、頭頂頭
                  - mark [ref=e266]: 髮
                  - text: 有否變稀疏、頭
                  - mark [ref=e267]: 髮
                  - text: 變幼細等，這些都是早期男性
                  - mark [ref=e268]: 脫
                  - mark [ref=e269]: 髮
                  - text: 的症狀。」 發現開始
                  - mark [ref=e270]: 脫
                  - mark [ref=e271]: 髮
                  - text: ，應盡早治療，「
                  - mark [ref=e272]: 脫
                  - mark [ref=e273]: 髮
                  - text: 的首三至六個月進行治療成效會較佳；如果
                  - mark [ref=e274]: 脫
                  - mark [ref=e275]: 髮
                  - text: 持續超過半年，毛囊開始萎縮，一至兩年後毛囊變得不再活躍，甚至縮小到看不見，治療效果便未必理想。」 胡惠福醫生又列舉現時常用的三種治療方法，病人通常會先用外用生
                  - mark [ref=e276]: 髮
                  - text: 水，進一步或會用到 口服藥物 、甚至植
                  - mark [ref=e277]: 髮
                  - text: 手術。「口服藥物可能會導致性功能障礙，如暫時沒有任何
                  - mark [ref=e278]: 脫
                  - mark [ref=e279]: 髮
                  - text: 跡象，就不建議利用藥物來作預防，因為預防
                  - mark [ref=e280]: 脫
                  - mark [ref=e281]: 髮
                  - text: 的藥物副作用較多，不值得為了預防而冒險。」無論哪種方法，病人都應先衡量，並向醫生諮詢和商量才使用。 在中醫角度，
                  - mark [ref=e282]: 脫
                  - mark [ref=e283]: 髮
                  - text: 其實與腎氣不足有關，註冊中醫彭子芯指不論男女，大約在30至40歲時，腎氣就會開始衰減，加劇
                  - mark [ref=e284]: 脫
                  - mark [ref=e285]: 髮
                  - text: 情況。「臨床所見，男士地中海
                  - mark [ref=e286]: 脫
                  - mark [ref=e287]: 髮
                  - text: 者的體質通常為肝腎不足型，加上都市人生活作息不定時、經常捱夜、飲食習慣等問題，都會加速這個臟腑的衰減。」肝腎不足者還會表現得精力不足、易疲累、睡眠質素變差及性功能下降等。 而
                  - mark [ref=e288]: 脫
                  - mark [ref=e289]: 髮
                  - text: 與基因遺傳有關的說法，彭子芯醫師指這相對於中醫的「先天不足」，「男士以腎為本，腎功能對男士特別重要。如果父輩或直系親屬也有嚴重
                  - mark [ref=e290]: 脫
                  - mark [ref=e291]: 髮
                  - text: ，那麼病人可能先天腎氣不足而令頭
                  - mark [ref=e292]: 髮
                  - text: 較脆弱，也較同齡的人更容易出現
                  - mark [ref=e293]: 脫
                  - mark [ref=e294]: 髮
                  - text: 。」 彭子芯醫師強調，先天只是一部份因素，後天因素影響亦十分重要。「先天不足加上後天失調，亦可靠中藥或其他方法來強健肝腎。另外有些病人因濕熱而導致頭油或頭瘡較多，或睡眠不佳、腸胃失調等，亦可以服藥改善體質。」彭子芯醫師提醒，有
                  - mark [ref=e295]: 脫
                  - mark [ref=e296]: 髮
                  - text: 遺傳風險的男士，應由20歲開始便保養身體，除了戒煙酒、不捱夜外，房事亦不宜過多，否則會損傷腎精。 傳說生薑磨頭皮能治
                  - mark [ref=e297]: 脫
                  - mark [ref=e298]: 髮
                  - text: 和生
                  - mark [ref=e299]: 髮
                  - text: ，彭子芯醫生指這方法有一定效用，但並非人人適合，「如果病人體質偏熱，頭皮偏紅，容易出油和出瘡，便不適合使用生薑。」 如病人
                  - mark [ref=e300]: 脫
                  - mark [ref=e301]: 髮
                  - text: 年期較長，除了以中藥治療改善體質外，亦可配合頭皮針灸治療，以刺激毛囊生長頭
                  - mark [ref=e302]: 髮
                  - text: 。平日輕
                  - mark [ref=e303]: 敲
                  - text: 百會穴、四神聰、頭維、印堂四個
                  - mark [ref=e304]: 穴位
                  - text: ，有助預防
                  - mark [ref=e305]: 脫
                  - mark [ref=e306]: 髮
                  - text: 和改善睡眠質素，另外平日亦可多飲湯水來預防
                  - mark [ref=e307]: 脫
                  - mark [ref=e308]: 髮
                  - text: 。 彭子芯醫師教大家煲一款「首烏桑椹生
                  - mark [ref=e309]: 髮
                  - text: 湯」，適合肝腎不足型、
                  - mark [ref=e310]: 脫
                  - mark [ref=e311]: 髮
                  - text: 、白
                  - mark [ref=e312]: 髮
                  - text: 多的人士飲用。湯水的材料如製首烏、桑椹及熟地，可補肝腎、益精血生
                  - mark [ref=e313]: 髮
                  - text: 和令頭
                  - mark [ref=e314]: 髮
                  - text: 烏黑；黑豆和合桃亦補腎健脾胃、烏
                  - mark [ref=e315]: 髮
                  - text: 明目。每星期飲用1至2次，除預防
                  - mark [ref=e316]: 脫
                  - mark [ref=e317]: 髮
                  - text: ，亦改善輕度
                  - mark [ref=e318]: 脫
                  - mark [ref=e319]: 髮
                  - text: 問題。如體質濕熱、大便稀溏人士則不適合服用。 首烏桑椹生
                  - mark [ref=e320]: 髮
                  - text: 湯 材料（1人份量）： 製首烏 10克 熟地 10克 桑椹 10克 合桃 30克 黑豆30克 紅棗 2粒 生薑 2片 栗米 1條 甘筍 2條 做法： 1.洗淨所有材料、紅棗去核。 2.先用清水浸泡黑豆約3小時。 3.栗米、甘筍切件。
                  - mark [ref=e321]: "4"
                  - text: ".煲內放入所有材料，加入清水蓋過面，大火煲滾後轉細火。蓋上蓋，煲約一小時，加鹽調味即可。 Reference: https://www.bbc.com/future/article/20121210-are-bald-men-more-virile Hagenaars, Saskia P, Hill, W David, Harris, Sarah E, Ritchie, Stuart J, Davies, Gail, Liewald, David C, . . . Marioni, Riccardo E. (2017). Genetic prediction of male pattern baldness. PLoS Genetics, 13(2), E1006594. Li, R, Brockschmidt, F.F, Kiefer, A.K, Stefansson, H, Nyholt, D.R, Song, K, . . . Richards, J.B. (2012). Six novel susceptibility Loci for early-onset androgenetic alopecia and their unexpected association with common diseases. PLoS Genetics, 8(5), E1002746. Chawnshang Chang, John Kokontis, & Shutsung Liao. (1988). Molecular Cloning of Human and Rat Complementary DNA Encoding Androgen Receptors. Science (American Association for the Advancement of Science), 240(4850), 324-326. Cranwell, W. (2016, February 29). Male androgenetic alopecia. Retrieved March 12, 2021, from https://www.ncbi.nlm.nih.gov/books/NBK278957/ 撰文：inscie、黃以聲 拍攝：周芝瑩、張志孟 動畫：怪奇 編輯：鄒仲安 ----------------------------- 支持蘋果深度報道，深入社區，踢爆權貴，即Like 蘋果專題及調查組FB專頁 ！"
