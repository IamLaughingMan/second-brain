                  - text: 身的 C，早前曾因為抗爭被捕，對他而言不再被捕是最重要的條件，所以早在星期一，他已經開始物色渠道離開，但結果一直碰壁，直到這條水道出現。結果 C 在星期四下午，和兩名隊友爬下水渠，作為後來者他們的準備遠比那 17 人充份，配載全面罩，穿著足夠的保暖衣物，膝蓋包好保護用的膠膜，「一落去啲水去到橫隔膜位，浸水之前有猶豫，一落去就無嘢，因為已經踩咗落去。」 記者亦有到渠內觀察他們離開的過程，當時水深比 17 人進去時低近一呎，只需微微低頭已可以沿渠而行，所以他們前進迅速，很快就消失在視線之中，「到行咗 5 到 10 分鐘，會去到一個比較開闊嘅位置，條路會愈行愈闊。」 「牆上面好多曱甴，幅牆係黑色，未試過咁多蟲聚埋一齊，但係你無時間驚，緊張到你唔會 feel 到好凍。」 大概 20 分鐘後，記者收到 C 的訊息報平安，「已出」。 「我哋問現場啲人，3 分鐘之前仲有警察企喺我哋個位。」在把風的家長協助下更衣，躲過警察，C 形容他「大搖大擺」離開，之後再上「家長車」回家，「一路行一路喪笑，好似咁多日嘅壓力釋放咗，控制唔到自己，係咁笑。」 策劃 從 M Core 渠口離開的逃生者，單是記者親身目擊，已經超過 30 人。而在外面協調逃生的 K 和 T，則估計從水道離開理大的人多達 200。K 透露，從渠口逃生被陸路更需要外界支援，除了基本的把風、車手，亦需要工程、建築等「專業人士」協助，「有專業人士兩
                  - mark [ref=e649]: 日
                  - text: 兩夜唔瞓去睇數據、水位、日出日落、圖則，研究點離開。」同時亦有「精銳勇武」小隊，在外面反方向爬向理大，確認渠道可行。 據 K 稱，除了最多人離開的 M Core 渠口，其他座數都有渠口可以逃生，「落到去個世界係一樣，係行遠啲定行近啲。」出口方面，最遠一個要在渠內行走近兩小時。 「我開頭好左膠咁講我反對，因為我唔想喺個海度撈返佢上黎，但入面小朋友求存回家嘅意慾，已經超越我哋嘅計劃同框架。」K 說。 他可以做的，就是盡量配合和策劃，令這批冒險逃生的人安全回家，因為他根本無法阻止，「我哋再三叮囑，你唔知入面有咩氣體，佢哋都話唔緊要，係咪都死，佢地寧願用呢個方法，寧願死喺入面。」 曾親身接觸多個逃生者的協助者 T，亦無時無刻質疑自己所做的是否害人送命，他憶述其中一個爬渠逃生者，落渠後失聯 5、6 小時，要靠「搭上搭」才確認平安，逃生者再次來訊，已經是 10 多小時後的事，「一度以為佢死咗，如果佢真係有事，我會後悔一世。」 後遺 鑽進漆黑的水渠，冒死亡的風險逃走，不論是成功的 C，或是失敗的 D 都表示，他們根本沒有其他選擇，「試過睇 Z、T、Y（Core），都包死哂，無路走，無位可以走，得返地底。」最終安全離開理大的 D 說，至今在仍會夢見在渠道中漆黑的環境，但他仍然認為，除了爬水渠是別無他法。 原因是他親眼目睹星期一晚，一大批義務救護被警方上索帶押走，警察除了在現場扔震撼彈，速龍還配備了可以發射實彈的步槍，「被速龍實彈打中又係死，落去（爬水渠）又係死。」D 說，「喺入面食唔到，瞓唔到，我知我精神狀態頂唔順。」 「望住個渠口，有一種渴望，係一定會成功出到去。」 文／林彥邦
