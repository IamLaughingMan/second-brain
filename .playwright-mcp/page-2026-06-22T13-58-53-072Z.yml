                  - text: 釋法，否定了2007和2008的普選。所有參與研究的學者非常憤怒，並於5月的記者會齊穿黑衣，宣告「香港民主已死」。 自此之後，我專心公民教育，發展教會的服務事工。 2008年，我做大腸鋇劑造影檢查（Barium Enema），穿腸鋇入腹腔，即時要接受緊急外科手術，醫生表示我只有五成生存機會。 徘徊於生死邊緣，幾乎陷於生離死別的時候，我囑咐兒子說：「孩子！要好好照顧媽媽呀！」 感謝上主的恩典和醫生的悉心治療，救回我的生命。 病後，我心裏只有三個心願，做好教會退休後的交接工作；陪伴妻子和家人，特別兩位孫兒，我很喜歡和他們遊玩、嬉水；寫一本關於民運的歷史書，只此而已，我便滿足了。 2010年我退休了，許多關心我身體的弟兄姊妹和朋友均勸我：牧師，你對教會和社會已盡心盡力了，夠了，好好休息和陪伴家人吧！ 2013年1月，當戴耀廷教授發表一篇名為「公民抗命：香港民主運動的大殺傷力武器」的文章時，我不以為意。 當戴教授於2013年2月提及邀請陳健民教授和我參與「公民抗命」時，我感到驚訝愕然。 我人老了，身體又多病痛，怎可能參與呢？惟有致電我的好朋友陳健民教授，徵其意見，他竟然說：「牧師，我現在於巴黎，你先答應，待我回來，再詳談商議。」 身處管治失效，道德淪落，沒有威信，強調鬥爭，不顧人民死活的政府，似乎無意實踐承諾於2017年普選行政長官，故遲遲不提出諮詢。戴耀廷教授和陳健民教授不惜為公義、公平犧牲，爭取2017年一人一票選特首，我雖然已70高齡，但禁不了良知的呼喚，我絕不會讓我的弟兄孤身上路。 還記得少年時，基督教我認識真理，離開孤單的人生；還記得教會內，基督訓示我擁抱窮人，讓他們不再孤單；今天，民主號角再次響起，我怎能讓有心人孤單呢？ 我的眼睛明亮起來，憑着良知多走一步，與民眾多走一里路。 聖經告訴我：「……愛是出於清潔的心、無愧的良心和無偽的信心。」（提摩太前書1:5） 我本着清心、簡念、分別為聖──無利益衝突、無權利慾望、無隱藏議程、決心為香港盡最後一分力，與港人再多走一步。 2013年3月27
