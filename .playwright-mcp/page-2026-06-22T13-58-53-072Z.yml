                  - text: 下是一張擠滿皺紋的黑瘦臉龐高貴增，木無表情地在醫院裏守候，他對孩子自縊不遂後，昏迷了逾6天，仍未蘇醒，感到非常自責。9歲的小海，早前因發燒不適，找父母要10塊錢去看病時，卻遇上家貧缺錢的父母相互推諉，為了誰去借錢還發生激烈爭吵。他於是在次日選擇在房間裏，用自己的紅領巾在床樑上打了一個結，然後……，小海子最終獲救，但在長時間昏迷。而小海入院初期花了近萬元，每一次輸氧就要花掉700元，都是家人借來的，但僅佔整個醫藥費的一小部份！ 《廣州
                  - mark [ref=e747]: 日
                  - text: 報》 個案二 索醫療費不果 摔傷地盤工自殺亡 青島市一名四川籍民工，因在地盤工作時摔傷腰部，住院兩個多月後，被接回地盤宿舍休養，其後他向地盤負責人索取醫療費不果，疑因無錢治病，最終被發現在宿舍碌架床上吊自殺身亡。 自殺的任姓民工來自四川南充，年約50歲，在青島的肇事地盤任鋼筋工人。去年11月9
                  - mark [ref=e748]: 日
                  - text: 上午，工友發現他在碌架床上吊，送院證實已死亡。工友稱，任死前兩個多月，在地盤從
