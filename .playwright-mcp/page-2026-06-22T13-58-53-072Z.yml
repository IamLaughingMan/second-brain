                  - text: 米多高的鐵架上摔下來，腰部重傷要動手術。但住院兩個月後，地盤負責人不願再出醫療費，就將他從醫院拉回工人宿舍內休養，「他天天被病痛折磨着。」任其後經常向地盤負責人要錢治病，但都遭拖欠，而走上絕路！ 青島《半島都市報》 ‧「我生活在一個縣裏，月收入不到1000元，看一次感冒就用了300元，你說貴不貴？」 ‧「賣瓜的小販總說自己瓜甜，這是常識；那些委員都是衞生界的，為自己說話不奇怪！」 ‧「把他們的工資給我，看病的紅包給我，我也會說看病不貴也不難！」 ‧「讓他們像普通老百姓一起，到不熟的醫院去試試，就知道看病難不難了！」 ‧「中國老百姓看病難、治病貴，早是人人皆知，這些委員是睜眼瞎！」 ‧「他們有幾個是平民？不是官就是富，都是社會上層！」 ‧「大家一起打電話給他們所在的政協，要求免了他們！」 ‧「他說發達國家也一樣，人家的診病質量、服務質量、透明度比你強，花錢也願意！」 資料來源：網易/騰訊網
