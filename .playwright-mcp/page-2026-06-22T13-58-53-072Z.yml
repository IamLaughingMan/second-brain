                  - text: 圓，然後好像當年的嬉皮士那樣環遊世界。最先到的是香港。然後去泰國，去緬甸，去印度，巴基斯坦、阿富汗、伊朗、土耳其、希臘、意大利，南下去非洲。在當時的扎伊爾（今日的剛果）中瘧疾，在鄰近的烏干達被誤當間諜入獄。從非洲坐船去美國。整個過程長六年。 「你漸漸會有種感覺，很多意外不到你控制。有些事情冥冥中自有決定。」在洛杉磯打工儲錢，本打算繼續旅行，但某夜酒醉，撒尿時在腦海裏面聽到一把聲音問：「Where are you？」（啊，在廁所。）「What are you doing？」（屙緊尿囉！）是為他第一次與神對話，是否醉話則不可知。「當然祂不是問我『現在』在哪裏做甚麼，而是問我的人生。這次經驗是個契機，讓我重新審視自己，讓我想要成為牧師。」 上世紀80年代中開始讀神學。讀學士、碩士、博士，讀了七年。後來在美國做牧師，二十多年。是很正常的牧師。六年前，他的教會人氣漸旺，信徒漸多，他卻聽見神的呼召，要他回日本。先是連續做夢；然後是久別的朋友突然來訪，說神要他回日本；翻開《聖經》，也翻出了《使徒行傳》第七章第三節。「你要離開本地和親族，往我所要指示你的地方去。「既然神叫到，冇計啦。」於是他便從基督徒比例約75%的帝國，回到基督徒比例1%的島國。 無人無物，一切都要重新開始。牧師吧就是他的新嘗試。正職則是經營自己的教會，但經營教會沒有錢，錢都是賣酒賺回來。一杯牧師Highball賣700
