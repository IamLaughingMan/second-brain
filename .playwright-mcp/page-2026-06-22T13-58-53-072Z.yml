                  - mark [ref=e950]: 敲
                  - text: 銅鑼，鼓鈸喧天，暮色沉沉的馬游塘村生猛了：金豬開陣，祝禱繚繞香燭，爐火熊熊蒸氣騰騰──村屋間空地搭竹棚張綵燈，筵開廿八席，熱辣辣葷素源源上桌來，觥籌交錯，賓主俱歡顏。 這是一場筵席包辦館「大來東南」主理的壽宴。食材爐灶、枱凳碗筷、侍應廚師統統到會來。從上世紀中葉起，大夥就像紅船戲班一樣鄉轉鄉，走過六七動盪、七八十年代經濟飛躍⋯⋯伙頭兵團今天
                  - mark [ref=e951]: 髮
                  - text: 稀了、背彎了，彈指間炒炸蒸燉，光芒依舊在。縱然行業日落江河，廉頗亦老矣，但這終究是他們的舞台，猶如大老倌踏出虎度門，必定傾力演出。 正月，是大來東南全年難得的忙碌時候，一個周日包辦了六七個筵席。人稱「倫叔」的老闆陳倫駐店調兵遣將：哪位師傅擅長哪些菜、走甚麼崗位、誰去煮
                  - mark [ref=e952]: 日
                  - text: 宴或晚宴甚至走兩場……他自詡為僱傭兵阿頭，「無僱傭兵，怎打成仗？我們有後生的，不是個個六十幾，八十幾也有，總之是耆英啦！耆英功夫夠，守門好，調味等等準確些。」倫叔八十歲了，依然精神矍鑠。 幾十年來他都行散工日薪制，有訂單就召集好兄弟埋班。這晚壽宴，他派出三個大師傅，四蒸兩炒六個爐頭，還有幫廚和雜工十三人。「我們包辦筵席，不可能跟酒樓一樣分工。」晚上十幾個樓面，
                  - mark [ref=e953]: 日
                  - text: 間已在油麻地店內劏魚剪蝦。 師傅也清晨六點多回店預備：需火候的燉湯、炸子雞上皮，以及每一個菜式的配搭得先做好。譬如「百寶鴨」，全鴨起骨，再釀入蓮子、銀杏、瑤柱、鹹蛋黃等超過八種材料，扣燜一小時，廿八席的鴨就花上好幾小時。筵席現場，師傅也「瓣瓣得」：砧板埋灶搬抬，隨時走位「執生」：上菜急起來也要掉下熱鑊去幫手排菜。「我們好似舊時打波，十上十落的陣形。」倫叔用荷蘭隊全能足球比喻。 包辦的承諾 藍田山上馬游塘村的壽宴，七點開席，午後雜工率先運來枱凳鋪設；師傅和食材工具在兩三點陸續抵達，起爐搭灶洗刷，肉食菜蔬調味料一一擺列開來。 五點多，鑼鼓響起，主家拜神；師傅開爐點火，首先熬煮糖水紅豆沙，而澆在大菜上的濃芡、炸油一一先推先熱待用；雜工披上白恤衫，變身侍應候命。準時七點，拜神金豬吃罷，冒着白煙好彩頭的「發財好市」啟動盛宴，主人賓客齊舉杯：「飲勝！」 大家酒酣耳熱之際，在爐邊起勁的師傅忽然停下來，翹首以待。原來主家要敬酒，樓面事前通報師傅歇一歇。「包辦筵席有一好處。酒樓一起菜就全部煮了出來。去到你府上就不是了：喂，師傅慢一點啦！遲幾個字再起菜啦！師傅就會停。」倫叔得意地說。 他強調，大夥臨時是主家的僕人，「也可以說是包辦的承諾，如果到時『我不喜歡做』，唔得！你幾大都做完那一晚。」像這天天氣不穩，主家搭的竹棚不能遮蓋廿八圍，要分頭二圍，大夥就分兩次煮食招呼，工時長了近一倍，酬金不變，也無怨言。 功夫，六十年前 這晚主家曾宏五兄弟為八十有一的母親擺壽。「我覺得在村搞到會很有氣氛。」曾宏說，原來四十多年前阿爺已跟東南結緣。跟冷餸翻熱的盆菜不同，筵席上每一道菜現煮現吃，那股熱辣辣給人驚喜連連：一條蒸魚上來，剛剛離骨，很嫩滑；熱炒燜煮，全是「小時候酒樓的味道」──沒複雜的化學調味，吃了不口渴。 賓主享用完鬆軟大壽包、濃甜紅豆沙，盡歡席散。師傅撤退，樓面收拾狼藉杯盤。時近午夜，大貨車盡吞爐具碗碟，消失於夜幕下；要不是賓主臉上的悅色酒氣，盛宴好像沒發生過。 倫叔說，筵席到會不是沒市場，飲食集團也設部門營辦，不過數獨立經營、既包辦「筵」（菜）又提供「席」（枱凳餐具）的筵席專家，九龍只怕剩下他這一家。而他，也入行超過半世紀了：1957年，十九歲的他由廣州來港做了一年錶行打雜，就投靠開包辦館的姑丈，從此走上包辦路。 「當時甚麼也不懂，何謂大雞三味？何謂四和菜三和菜？好烏龍。」知不足，學不倦。他晚上一有空就用舊報紙練字；看營業部怎樣寫菜單；入廚房偷師。後來他往外闖，包辦館、茶居，樓面廚房點心樣樣都做。「我們東南的事頭請人，席上揀菜薳，好挑剔，你不勤力不醒目他不睬你。」他先後入東南、大來兩間包辦館。兩店由甘
                  - mark [ref=e954]: 日
                  - text: 新和嚴志二人在1948年創立。1972年，兩位老闆退休打算結業，他於是和拍檔用盡十萬元積蓄頂手，把兩個字號合併成為「大來東南」。 筵有大小 無分階層 倫叔二十多歲就在包辦館當上大掌櫃。他回憶，行業在六七暴動前最興旺。大來經常到富貴人家的花園別墅做宴；主家一來喜歡包辦隨時候命，二來家宴私隱度高。那時，工廠在大時大節和廠慶也經常擺酒，「譬如唯一水壺廠、鄧芬記。有錢佬聚居的又一村、中半山、九龍塘，那時候很多……」倫叔不願提豪客名字叨光，只漏了嘴：「舊時總華探長是常客，現任不少高官警司也食過我們的餸菜。」 從前，包辦館街街也有，單是廟街已四五間，包括大來和東南。店本身也擺到三四圍，「那時無冷氣，太太們喜歡高髻頭，牛角扇吹到髻都歪了。」倫叔忍不住笑起來。六七年暴動後，有錢人紛紛離港暫避，兩店生意跌了八九成。及至七十年代，酒樓愈開愈多，「人家當然想嘆冷氣、更好的招呼和環境。」包辦筵席漸漸式微。 為了拓展生意，倫叔二十年前也做起盆菜來；沙士前甚至也做蛇宴。現在筵席和盆菜各佔一半。盆菜有幾百元一圍；筵席可達萬多元一席，但不多；千多元最平常。「貴婦狗生日請客仍然有；隱形富豪做生日、擺滿月，入伙一定要光顧我們啦！旺一下新屋。」他做得最多的是社團和大學千人宴。正月時，露宿者之家也訂了五席給附近油麻地、深水埗的街友。蒜香基圍蝦、菜膽百寶鴨、五柳炸石斑……他和師傅一視同仁用心炮製，佳餚趁熱派人連同摺枱碗筷用手推車送過去，服務周到無分階層。 老友一齊打天下 「我做了幾廿年，後生做到老了。」倫叔笑咪咪，總是腳踏白水鞋，手握一罐生力啤。接洽生意、買料、訂貨他一腳踢；廚房告急他就衝入廚房，樓面不行幫樓面。 「現在無人願意（接手）做這樣辛苦的事了。」大來東南到今天，打理人只剩他一個。人家退休坐公園，他很抗拒，有事做就開心，「回來認識多些朋友，老中青也認識一些，多好呀！同時跟社會不
                  - mark [ref=e955]: 脫
                  - text: 節。」 辦公枱上，毛筆墨盒放在手邊，他十年如一
                  - mark [ref=e956]: 日
                  - text: 為客人擬寫菜單。菜單值多少錢，他就買同等的貨給客人。「你不可以隨便一種貨給主人家，否則如何運作幾十年呀？蠔豉來說，客人需要大隻的金蠔或最大的沙井蠔，二百多元一斤，我需要買那些。小一點百多元甚至幾十元一斤，不同嘛！」 人隨行業走到日暮，倫叔一點不傷感。目睹同行一間間消失，唯獨大來東南撐了下來，他淡淡然說：「無人光顧，你就要結業。我們幸好有班老友記合作，圍威喂，打天下！」倫叔呷一口他形容為「生命之源」的啤酒，清涼、回甘。 舉重若輕 大師傅 謝龍師傅（67歲） 入行四十多年，去過上海、台灣做大廚。這
                  - mark [ref=e957]: 日
                  - text: 他中午和七十多歲的Man叔在上水煮了六圍，傍晚再來馬游塘村拍檔入行六十年的鄭成師傅炮製廿八席。一年之中，只年尾正月較忙，「如果靠包辦筵席搵食，真是無得食。」他在大來做散工三十多年，倫叔叫到，義不容辭。「當做義工舒筋活絡，是一種樂趣，大家老友傾吓偈開心點。」做廚師，謝師傅笑言：「客人讚好，證明自己煮得好。」 黃錫師傅（66歲） 曾在港島有名的包辦館歐燦記隨父做廚，二十多年前歐燦記結業，轉來大來。「上門到會好像酒樓，只是整個廚房搬過去，沒有搭棚的就在露天煮。」這天，他清晨六點多就返油麻地店鋪廚房張羅，蒸煮了七八成，現場來做兩三成。席散，其他師傅撤退了，他留下來搬搬抬抬，收拾物資上車，回店卸貨已過午夜。「做慣了， 沒甚麼問題。」錫師傅總是和顏悅色。 撰文：韓潔瑤 攝影：關永浩、葉天榮 大來東南筵席 地址：油麻地廣東道844號永發樓地鋪 電話：2780 3145
