                  - text: 2013年，來自台灣的陳彥博到加拿大參加育空（Yukon）700公里極地超級馬拉松橫越賽，賽程中每天有長達17小時是黑夜，視野所及，僅是頭燈能照到的範圍，他常獨自睡在野外雪地，且一天只睡2小時，累到忘記身在何處，即使比賽結束回到旅館，他說：「我還是分不清夢與現實。」 撰文：戚海倫 圖片：陳彥博提供 這是陳彥博覺得「生不如死」的極限賽程之一。但這位偉大的極地超馬運動員，幼時卻是一個「膽小、怕冷又怕黑的孩子」。 2008年，大學生陳彥博與林義傑、劉柏園一起，徒步21天，艱苦完成650公里磁北極大挑戰。接下來10年間，陳彥博先是征戰世界7大洲8大站，跑過高原、沙漠、寒漠、峽谷、叢林……屢屢在極地環境下挑戰個人極限。 如今，32歲的陳彥博還在跑，他說：「長跑是一輩子的事！」 臉書粉絲頁有着28萬人按讚的高人氣，離開校園的陳彥博持續「Run For Dream」，他笑稱自己用最省錢的方式創業，除了開設「夢想跑班」，帶領台灣跑友團練；自己也持續訓練，6月初忍着雙腳腳皮磨光的劇痛（圖），在不丹200公里高山賽奪冠；現在，他正為這個月冰島250公里7天6夜超馬賽備戰，屆時，他將面臨零下8℃低溫、強風，以及複雜的地形與路徑考驗。11月中，他更準備花至少1個月，進行一項大型探險計劃。 陳彥博小時候其實是競速溜冰選手，一雙腿練成O形，後來為了跑姿正確，他每晚睡前用皮帶綁住雙腿，藉以矯正。中二開始跑步，進入成淵高中，遇上田徑教練潘瑞根，是他的人生轉捩點。 升上高中的陳彥博，下課後勤練田徑，從小菜鳥瘋狂進步成主將，但也因吃飯不正常，得了胃潰瘍，醫生診斷他的胃有9個洞，陳彥博的體重驟降，他選擇「落跑」，有2、3個月，他加入熱舞社逃避訓練，訓練
