                  - generic [ref=e504]:
                    - text: 朱耀明陳情書全文
                    - mark [ref=e505]: 敲
                    - text: 鐘者言
              - generic [ref=e506]:
                - generic [ref=e507]: 蘋果日報
                - paragraph [ref=e508]: 2019/04/10
              - paragraph [ref=e509]:
                - generic [ref=e510]:
                  - text: 作為一個終生為上主所用，矢志與弱勢者和窮苦人同行，祈求彰顯上主公義，實踐天國在人間，傳頌愛與和平福音的牧師，垂老之年，滿頭白
                  - mark [ref=e511]: 髮
                  - text: ，站在法庭被告欄，以待罪之身作最後的陳詞，看似極其荒謬和諷刺，甚至被視為神職人員的羞辱！ 然而，此時此刻，在我心中，在法庭的被告欄，是一生牧職最崇高的講壇，死蔭的幽谷成就了靈性的高峯。 幾十年來，講道無數，想不到最費時、最用心、受眾最多的講道，正是在被告欄的陳詞，這裏有我童年的故事、牧區的故事、香港的故事、民主的故事、最後一里的故事、雨傘運動的故事、人間和天國的故事。 古時的猶太人，期待救贖主來臨的日子，那裏再沒有痛苦和眼淚，但基督道成肉身，住在人間，經歷人世的艱辛，詮釋了救贖主的真義：「那裏有痛苦和眼淚，那裏就有救贖主！」 在乖謬的時代，在專權的國度，在扭曲的社會，我甘願成為一個勇敢的
                  - mark [ref=e512]: 敲
                  - text: 鐘者，喚醒人間昏睡的靈魂。 這一切，從我童年的故事說起。 我自幼失怙、失恃，幼時被送回鄉間隨祖母生活。 小學時，目睹殘酷的土地改革運動，許多「地主」受公審，群情洶湧，有些即時槍斃而死去，有些不堪凌辱而自盡。 政治鬥爭下，田地荒廢，人民成為犧牲者，捱飢抵餓，以樹葉野果充飢。 替人看牛和種田，與祖母相依為命，小學教育在打倒美帝國主義的口號下完成。 祖母離世更是無依，她死前託一位鄉里，申請我重回香港。擔着自己的行李，步行了一天，才到達台城車站。 抵港的第一天，便上工當學徒，不甘永遠煮飯和洗衣，出走露宿街頭，替人擦鞋為生，飽受歧視，更被黑社會欺凌毆打。 有一年，患上風濕性心臟病，住院兩個多月。 躺在病床，看見病友死前的掙扎，看見別人探病的親友，我卻孑然一身，傷心莫過於此。 我開始問自己：生存的意義是甚麼？生，彷彿是我個人的負累；死，可能是個人的徹底解
                  - mark [ref=e513]: 脫
                  - text: 。 就在我充斥死和解
                  - mark [ref=e514]: 脫
                  - text: 的念頭時，一位慈祥的老人家，介紹我充當校工。主任是一位虔誠愛主的基督徒，常傳福音，邀請我返教會崇拜。 耶穌說：「我就是道路、真理、生命」（約翰福音14:6），像痛苦盡處的燈火，給我生命的亮光。 我逐漸明白，我不能放棄，生活雖然孤苦，若然人間有愛、正道、真理、更高的生命價值和意義的道路，我決志跟隨。 靠着上主的恩典，憑着信心，克服學習上和經濟的困難，拿着離職的一個月港幣130元的工資，開始半工半讀，完成了三年高中、四年大專、三年神學院的課程，預備作傳道者，服侍基層，與弱勢者和窮苦人同行。 我知道，前行路上不再孤單，因為主與我同行。 1974年，我受託到柴灣浸信會服侍。 柴灣，一直被人視為香港的「紅番區」，名稱的由來，是由於地區人多擠迫，居民生活貧窮，教育水平低下，醫療衞生不足。 適齡兒童雖有學校教育，但沒有家庭的愛和關懷，一家大小，擠在僅可放置一床一櫃的徙置區，生活困苦，環境惡劣，青少年吸毒和犯罪率非常高。 還有不少家庭住在木屋區，夏天有風災和雨災，冬天深夜常有火災。每一次，我到災難現場，擁抱安慰災民，都深感窮人的痛苦與無助，我會用教會慈惠基金，撥款援助不幸的災民。 曾有一位弟兄向我訴說，他遭受市政署不公平對待，他的小販攤檔沒法經營。他向自己教會的牧師求助，牧師卻說：「我為你祈禱吧，祈禱過後，你就要去找朱耀明牧師了。」 這位弟兄來到我的面前，我跟他說，我們也祈禱。不過，我可多走一步，陪同他向行政立法兩局議員申訴署申訴，結果把問題解決了。 身為傳道人，不能對沒有衣服穿、沒有飯吃的人說：「『平平安安地去吧！願你們穿得暖，吃得飽』，卻不給他們身體所需要的，這有甚麼益處呢？」（雅各書2:16） 多走一步，教會應是散播盼望的群體；多走一步，教會應是擁抱傷痛的群體；多走一步，才是教會存在的真正意義。我一心決志與民同行，多走一步，一起爭取改善民生，爭取興建東區走廊，爭取興建東區醫院，爭取木屋居民上樓，爭取改善工人生活。 希望，就在爭取和奮鬥的人當中。 但教會是保守的，對傳道人參與爭取的社會運動，總是有所顧慮。 當年，參與爭取興建東區醫院時，我的教會正向政府申請土地興建教堂，第一次接受電視台訪問時，心裏有點不安，擔心政府視我們為壓力團體，拒絕批地；擔心我的同工和教友，對教會牧師參與社會運動，未能認同。 但聖經給我無盡的勇氣和力量。 聖經記載，耶穌道成肉身，住在人間，他宣告：「傳福音給貧窮的人……被擄的得釋放，失明的得看見，受壓迫的得自由」（路加福音
                  - mark [ref=e515]: "4"
                  - text: :18），這不是人類被救贖的好消息嗎？ 結果有權有勢的人卻帶祂到山崖，欲置祂於死地，但耶穌並不懼怕，從容地從人群穿過去，走了。 我們生於世上的信徒，應牢記保羅的教訓，他說：「我活着就是基督。」（腓立比書1:21） 基督沒有身體： 基督以你為祂的身體， 以你的雙手完成祂的工作， 以你的腳走遍世界， 透過你的雙眼， 把憐憫的目光投向世界。 大德蘭修女（Teresa of Avila, 1515-1582） 我被召為上主的僕人，效法基督，跟隨基督的腳步，承託祂的使命，於世上傳達上主的關懷，不應懼怕任何的政治壓力和別人的評價。 多走一步，與民同行，就是一步一步追隨基督。 我們這一代人，經歷戰禍，逃難來港，過着流離的艱辛生活，拼搏幾十年以為可以安定下來。 中英政府於1984年簽署了中英聯合聲明。中國收回主權，實施「一國兩制」、「港人治港」、「高度自治」，並保證香港50年不變，但卻未能完全穩定人心。 教會為此，曾推動「香港是我家」運動，以鼓勵港人不要離去。 1984年9月，有89個團體集會於土瓜灣「高山劇場」，要求漸進「還政於民」。香港教會為穩定人心，於1984年也表達了清晰的信念書： 1997年後維持高度自治，市民享有神所賦予的人權、自由，包括言論、出版、結社、集會、出入境、信仰及傳教等自由。 政府必須向香港市民直接負責；不單要致力於香港的經濟發展，同樣重要的是重視市民中沉默的大多數者的利益；並要繼續保持立法、司法及行政獨立。 信念基於我們的信仰：每個人都是按照上主的形象被造的。 因此，人人應受尊重和保護，我們致力爭取民主，因為民主的理想是自由、平等和博愛。政治自由不是單一地對國家的效忠，也應承認人的尊嚴，而且人人生活在社會，都有其獨特的潛力和能力，貢獻和創建社會，而人權是上主所賦予，任何政權均不得隨意剝奪。 不幸，1989年北京的民主運動，中共政權以「屠城」結束，目睹這場運動的結果，港人不寒而慄，對民主的訴求更為殷切。 當時，社會有要求英國給予港人護照，有要求1991年立法局必須由普選產生，八九民運之後，我主要照顧流亡的民運人士，擁抱苦難者。 1991年有地區直選議員。1995年已增加直選議席。同時，1991年港督衞奕信簽署了《香港人權法案》，香港既有的《社團條例》及《公安條例》所有牴觸《公民權利和政治權利國際公約》全予廢除。 普選有了進度和時間表，《人權法》使港人有進一步保障，我便少參與政制討論，多致力民生工作，特別是醫療、善終及退休保障等。 我心中懷抱善良的希望：民主、自由、人權和法治，會一天天的好起來。 一切善良的願望，竟然
                  - mark [ref=e516]: 日
                  - text: 漸渺茫，我又要重上高山，為了民主再啟航。 聖經的阿摩司先知，最關心公義與公平，他目睹失序和荒謬的社會繁榮，只限於富有的人，窮人仍然受着不公平的待遇和壓迫，他嚴厲警告世人：「你們要遭殃了。因為你們歪曲正義，剝奪了人民的權利！」（阿摩司書5:7） 香港有700多萬人，人人生而平等，政府卻剝奪人民的提名權、參選權。首屆特首由400人選出，政府和人民沒有任何關連。至今仍是由小圈子1,200人選出。 政府眼中沒有人民，人民也不信任政府，對於千百般民怨，特首一聲「早晨」，就視而不見。 2003年「沙士」襲港，政府抗疫無方，結果299人死亡，1,755人染病，董建華耗盡香港人的同情憐憫心，市民努力互濟之時，他卻硬推23條立法，導致50萬人上街抗議，最後「腳痛」下台。 立法會保有功能組別，剝奪了議員的私人提案權，政府的議案只要掌握功能組別和保皇黨的票數，很容易就可以通過，這種走向專權的制度，人民的生活較回歸前更困苦，更無助，更傷心。 我們再不能沉默了，為平等的人權，民主必須多走一步。 本着爭取民主的初衷，2002年，我們組成「香港民主發展網絡」（Hong Kong Development Network）（以下簡稱民網），成員包括有律師、學生、學者，並由陳健民教授領導30多名教授，研究符合基本法要求的政制方案。 2004年
