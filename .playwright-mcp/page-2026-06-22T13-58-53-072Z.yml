                  - text: 佔領，120萬人參與，展示香港和平非暴力的高質素公民，其間沒有破壞任何建築物，或焚燒任何物件。 佔領區的商店不但無損，反而佔領者鼓勵和幫助小店，以免生意受影響。很多商店和市民送飯、送水、送棉被、送帳幕，佔領者充份發揮互助互愛的精神。 雖歷經黑社會的暴力襲擊，警察亦以暴力打得佔領者頭破血流，但佔領者仍保持和平非暴力的信念，沒有退縮。 和平非暴力的公民抗命種籽，已深植人心。 這運動原是一場公民覺醒運動，期望每個人都能出來貢獻自己，表示決心，更希望能喚醒官僚的良知。 幸福和美好的和平生活，是我們夢寐以求的，也是上主的旨意，我們要踐行在人間。 沒有公義，便沒有和平，因為「公義的果實是平安；公義的效果是平靜和安穩，直到永遠」（以賽亞書32:17）同時，「慈愛和誠實彼此相遇；公義與和平彼此相親」。（詩篇85:10） 法律和秩序是任何社會不可或缺的。若法律只用作維護權貴既得利益者，不法和霸道便由制度肯定，社會道德基礎便蕩然無存，無權無勢者就成為法治制度的犧牲品。 那麼，政權只會藉國家安全的名義：以迫害、流放、任意逮捕、刑求、強迫失蹤、破壞和暗殺來維持所謂「和平」。（C. René Padilla） 或許您們會說：我們的問題源自「公民抗命」。 錯了！ 我們的問題，乃是來自「公民從命」。 這種從命，讓世上無數的人屈膝於強權，獨裁者的政體之下，被捲進死傷以百萬計的戰爭。 這種從命，讓世上無數的人對貧窮、飢餓、愚昧、戰禍與殘暴無動於衷。 這種從命，讓世上的監牢擠滿小奸小惡的罪犯：大奸大惡者，卻成為國家的領袖。 歷史學家霍華德．津恩（Howard Zinn） 今日是2019年
