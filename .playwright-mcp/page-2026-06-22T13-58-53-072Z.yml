              - generic [ref=e404]:
                - generic [ref=e405]: 蘋果日報
                - paragraph [ref=e406]: 2021/05/04
              - paragraph [ref=e407]:
                - generic [ref=e408]:
                  - text: 下周復活節假期殺到，在前夕前先推介四大春日活動，來一次偽日本之旅！男比女較易遇禿頭煩惱？中西醫跟你拆解原來同遺傳基因有關！英國一站式資訊網站助港人融入社區、港生分享考入英國劍橋準備、SBS新劇《朝鮮驅魔師》黃Viu有得睇、日籍大廚教你煮生蠔.....不同資訊娛樂全面覆蓋，為你解悶長知識樣樣齊！ 想搵齊折扣優惠、睇戲煲劇、親子活動、養生保健、煮飯熬湯、寵物錦囊、投資樓股、移民攻略、名人推介...？蘋果全新推出《蘋果資訊錦囊》，綜合九大平台編輯，每周私心推介不同精選食買玩消遣好去處，甚至可在家安排節目，睇騷、下廚、做手作等活動任君選擇！ 《蘋果資訊錦囊》逢周五推出，總之跟實我們推介，必有一項資訊合你心水！ 復活節前夕的周末，也不困在家裏，好好跟家人朋友外出逛逛。我們精選了四大節目，讓各位把握周末假期，體驗與別不同的活動，渡過難忘的假期。其中參加者可以製作香薰減壓嘖霧，令大家可以從急促生活節奏中休息一會。假如不想參與工作坊，亦可以選擇逛逛兩大在港日本祭典。當中不但有各種各樣的日本小食和雜貨可以選購，更可以在「高山古い町」大手門前打卡，恍如置身日本一樣。立即遨約身邊人，一起渡過難忘的周末吧。 周末好去處｜春日四大好去處 手作市集學整擴香石 高山老街食之祭偽日本旅行
                  - mark [ref=e409]: 脫
                  - mark [ref=e410]: 髮
                  - text: 禿頭問題困擾不少男士，當中成因人人不盡相同，例如壓力、營養、藥物等因素都有關係，不過遺傳基因是主因之一。如果不幸發現有禿頭現象，我們有何改善方法？本周健康蘋台邀請中、西醫與大家詳細分享。
                  - mark [ref=e411]: 脫
                  - mark [ref=e412]: 髮
                  - text: 是遺傳的｜男比女易禿頭同激素及基因有關 中西醫拆解治療與預防方法
                  - mark [ref=e413]: 日
                  - mark [ref=e414]: 敲
                  - mark [ref=e415]: "4"
                  - mark [ref=e416]: 穴位
                  - text: 防
                  - mark [ref=e417]: 脫
                  - mark [ref=e418]: 髮
                  - text: 英國首相約翰遜上星期親自與四個BNO家庭視像通話，歡迎港人家庭到英國生活，談及不少專業資格銜接問題，以及為子女找學校時遇上的困難。英國更有NGO建立了專為港人而設的 一站式資訊網站 ，可以尋找住屋、教育、工作等各方面資料，亦可以透過網站聯繫當地社區及認識附近鄰居，建立社交圈子，甚至有繁體中文版本，即將移英的港人不妨看看！ 港人入讀英國劍橋，你會否認為只有10優尖子才能做到？王德志(Danny)由小學至中學都是在本地津校就讀，但中六那年他想看看外面的世界，他會考成績有2A也算優異，但香港大有人在，與別不同在於他有這個夢，最後成功於2010年順利入讀劍橋數學系。到底這位男生是如何証明「劍橋不是夢」？ 【海外升學｜港生發力考入英國劍橋 雖非尖子狂操面試圓夢】 SBS新劇《朝鮮驅魔師》剛於星期一（3月22
                  - mark [ref=e419]: 日
                  - text: ）首播，香港劇迷可透過「黃Viu煲劇平台」煲劇。劇集由甘宇成、張東潤、朴成勳等人主演，製作費高達320億韓圜（約2.2億港元），喜歡喪屍片的劇迷絕對值得一看。不過，相信劇組考慮到內容較血腥暴力，首兩集列為19禁。 韓劇《朝鮮驅魔師》添西方聖經驅魔元素 五大看點區分《屍戰朝鮮》 近來很多人搶購盒裝日本即食生蠔，全因即開即食、爽甜肥美，而且價錢便宜，平均$200/盒，每隻不用$10，因此網店、食材批發店甚至街市海鮮檔都是一有貨就被掃清，其中以瀨戶內海播磨灘的出品最搶手。銅鑼灣高級日本餐廳Ginza Iwa日籍大廚本山太一郎，建議吃生蠔前最好先用過濾水清洗，然後用熱水輕拖，切開一半，最後加些少辣椒蘿蔔蓉、葱花和酸汁來吃。不但令味道更有層次感，更重要的是將生蠔煮至半生熟才給客人，吃得較安全。另外要留意生蠔當造期由二月到五月，要吃記緊把握時間。Ginza Iwa / 銅鑼灣駱克道459-461號The L.Square 17樓 / 2804 2004 /星期一至六6pm-11pm 日本生蠔｜全城熱搶日本即食生蠔 唔使$10/隻 肥美又爽甜 日籍大廚：拖水再加酸汁食最正 拍賣行中國嘉德香港2021春季拍賣會，將於
                  - mark [ref=e420]: "4"
                  - text: 月18至23
                  - mark [ref=e421]: 日
                  - text: 在香港會議展覽中心舉行，今次拍品包括如張大千、齊白石等名家之中國書畫、亦有如奈良美智之亞洲二十世紀及當代藝術，以及瓷器工藝品等各式珍稀精品近1,300件。另外，珠寶鐘錶尚品部分，則將以展售會形式與2021春季拍賣會香港精品展，一同由即日至本月31
                  - mark [ref=e422]: 日
                  - text: ，於力寶中心5樓的中國嘉德（香港）G Art藝術空間率先登場，為春拍預熱。 香港近年潮興試大麻二酚CBD，今周介紹一間位於上環的CBD Cafe「Found」。除了滿足各位主人慾望，還可以讓狗狗一試。Cafe提供兩款狗狗小食，人類餐單則以飲品為主，朱古力、茶、咖啡、酒精飲品都有，另外有朱古力曲奇及energy ball等少量輕食，每款飲品和食物都有加入少量的CBD。狗狗試吃過後亦似乎非常喜歡。周邊配套方面，如果想讓狗狗玩耍的話，最近要步行十五分鐘，才能到達中西區海濱長廊（上環段）寵物角。 狗狗好去處2021｜上環寵物友善CBD Cafe 帶狗狗試嘆「大麻素」鬆一鬆 成名於大圍的品記麵食，上月搬往西貢，招牌是一系列懷舊粉麵如油渣麵、豬膶麵、番茄豬扒麵等。老闆從小已夢想開餐廳，自言只懂煮食，而且為人有要求。店子只賣幾款食物，做法講究，老火老薑湯豬膶麵是人氣熱賣，豬膶先挑筋後切厚件，啤水約30分鐘至血水完全洗淨，再用鹽、糖、生抽、燒酒、蛋白等醃一晚；薑湯是薑汁及水1:1熬成，加入基本調味後備用，出菜前老闆會加薑渣再煮，增加口感及香味。豬膶厚薄適中，粉嫩不柴，湯底濃郁辛辣，碗碗即叫即煮，入口熱辣辣。品記麵食 / 西貢普通道183D號地下 / 5916 7988 / 星期三至
                  - mark [ref=e423]: 日
                  - text: 12nn-6pm，星期一二休息 西貢美食｜的士司機轉行賣懷舊粉麵 自製豬油渣賣$35油渣麵 $37薑湯豬膶麵薑味十足 ----------------------------- 支持蘋果深度報道，深入社區，踢爆權貴，即Like 蘋果專題及調查組FB專頁 ！
