                  - text: 鐘者言 ── 被告欄的陳辭〉 作為一個終生為上主所用，矢志與弱勢者和窮苦人同行，祈求彰顯上主公義，實踐天國在人間，傳頌愛與和平福音的牧師，垂老之年，滿頭白
                  - mark [ref=e574]: 髮
                  - text: ，站在法庭被告欄，以待罪之身作最後的陳辭，看似極其荒謬和諷刺，甚至被視為神職人員的羞辱！ 然而，此時此刻，在我心中，在法庭的被告欄，是一生牧職最崇高的講壇，死蔭的幽谷成就了靈性的高峯。 幾十年來，講道無數，想不到最費時、最用心、受眾最多的講道，正是在被告欄的陳辭，這裏有我童年的故事、牧區的故事、香港的故事、民主的故事、最後一里的故事、雨傘運動的故事、人間和天國的故事。 古時的猶太人，期待救贖主來臨的日子，那裏再沒有痛苦和眼淚，但基督道成肉身，住在人間，經歷人世的艱辛，詮釋了救贖主的真義：「那裏有痛苦和眼淚，那裏就有救贖主！」 在乖謬的時代，在專權的國度，在扭曲的社會，我甘願成為一個勇敢的
                  - mark [ref=e575]: 敲
                  - text: 鐘者，喚醒人間昏睡的靈魂。 這一切，從我童年的故事說起。 我的童年故事 我自幼失怙、失恃，幼時被送回鄉間隨祖母生活。 小學時，目睹殘酷的土地改革運動，許多「地主」受公審，群情洶湧，有些即時槍斃而死去，有些不堪凌辱而自盡。 政治鬥爭下，田地荒廢，人民成為犧牲者，捱飢抵餓，以樹葉野果充飢。 替人看牛和種田，與祖母相依為命，小學教育在打倒美帝國主義的口號下完成。 祖母離世更是無依，她死前託一位鄉里，申請我重回香港。擔着自己的行李，步行了一天，才到達台城車站。 抵港第的一天，便上工當學徒，不甘永遠煮飯和洗衣，出走露宿街頭，替人擦鞋為生，飽受歧視，更被黑社會欺凌毆打。 有一年，患上風濕性心臟病，住院兩個多月。 躺在病牀，看見病友死前的掙扎，看見別人探病的親友，我卻孑然一身，傷心莫過於此。 我開始問自己：生存的意義是甚麼？生，彷彿是我個人的負累；死，可能是個人的徹底解
                  - mark [ref=e576]: 脫
                  - text: 。 就在我充斥死和解
