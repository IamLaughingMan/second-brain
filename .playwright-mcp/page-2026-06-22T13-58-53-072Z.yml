                  - text: 下周復活節假期殺到，在前夕前先推介四大春日活動，來一次偽日本之旅！男比女較易遇禿頭煩惱？中西醫跟你拆解原來同遺傳基因有關！英國一站式資訊網站助港人融入社區、港生分享考入英國劍橋準備、SBS新劇《朝鮮驅魔師》黃Viu有得睇、日籍大廚教你煮生蠔.....不同資訊娛樂全面覆蓋，為你解悶長知識樣樣齊！ 想搵齊折扣優惠、睇戲煲劇、親子活動、養生保健、煮飯熬湯、寵物錦囊、投資樓股、移民攻略、名人推介...？蘋果全新推出《蘋果資訊錦囊》，綜合九大平台編輯，每周私心推介不同精選食買玩消遣好去處，甚至可在家安排節目，睇騷、下廚、做手作等活動任君選擇！ 《蘋果資訊錦囊》逢周五推出，總之跟實我們推介，必有一項資訊合你心水！ 復活節前夕的周末，也不困在家裏，好好跟家人朋友外出逛逛。我們精選了四大節目，讓各位把握周末假期，體驗與別不同的活動，渡過難忘的假期。其中參加者可以製作香薰減壓嘖霧，令大家可以從急促生活節奏中休息一會。假如不想參與工作坊，亦可以選擇逛逛兩大在港日本祭典。當中不但有各種各樣的日本小食和雜貨可以選購，更可以在「高山古い町」大手門前打卡，恍如置身日本一樣。立即遨約身邊人，一起渡過難忘的周末吧。 周末好去處｜春日四大好去處 手作市集學整擴香石 高山老街食之祭偽日本旅行
                  - mark [ref=e341]: 脫
                  - mark [ref=e342]: 髮
                  - text: 禿頭問題困擾不少男士，當中成因人人不盡相同，例如壓力、營養、藥物等因素都有關係，不過遺傳基因是主因之一。如果不幸發現有禿頭現象，我們有何改善方法？本周健康蘋台邀請中、西醫與大家詳細分享。
                  - mark [ref=e343]: 脫
                  - mark [ref=e344]: 髮
                  - text: 是遺傳的｜男比女易禿頭同激素及基因有關 中西醫拆解治療與預防方法
