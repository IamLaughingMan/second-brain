                  - text: 記隨便交差了事。 有一天，教練潘瑞根叫他到學務處，將「退學單」遞給他，只說了句：「你想一想！」再也沒講話。陳彥博說，他當時嚇到手發抖、腦中一片空白，顫抖接下退學單。當天晚上，他去剃了光頭，下定決心積極治療胃病，隔天準時向田徑隊報到，重返跑道。 後來，陳彥博與潘瑞根約定，高中三年級要拼全中運1萬公尺金牌。在花蓮全中運賽場上，當陳彥博真的率先進入終點、完成約定的那一刻，「我真的很快樂，再苦，我都願意！」在他心中，是「第二個父親」潘瑞根讓他改變；是跑步，讓他有了相信自己的勇氣。 陳彥博的雙親都是雲林人，原先務農，陳彥博幼時家境並不好，父親管教十分嚴格。「我是被打大的，考試不及格、打電動、太調皮，免不了就是一頓水管、皮帶伺候。」陳彥博回憶，童年一次因為偷打電動，父親氣到要他跪在行人路上不說，還要他當街大喊：「我叫陳彥博，我以後再也不打電動了！」當時父親認為，惟有孩子有了羞愧感，才不會學壞。 陳彥博讀小學時，父母改做衣服代工工廠，在陳彥博的記憶中，很多時間是跟着父母工作，車衣服、熨衣服、包裝、送貨。但長期下來，父親陳彬因熨衣造成腰傷，下定決心用所有積蓄到美國考脊椎矯正證書。這個重要決定，也改變了陳彥博的家庭生活。 陳彥博的父親說，彥博小時候只要聽鬼故事，就不敢一個人睡；在雲林阿嬤家，晚上黑，不敢一個人去上廁所。陳媽媽說，記得彥博小學時，全家人搭車要上武嶺遊玩，還不到1小時，車上5個人只有彥博手全凍僵變紅，怎麼幫他搓手取暖都沒用，只好掉頭下山，「我百思不得其解，為甚麼他後來能去挑戰極地超馬，很不可思議」。 但怎麼也沒想到，這個膽小、怕冷又怕黑的孩子，不只在高中田徑隊訓練
