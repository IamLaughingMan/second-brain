        - tabpanel "蘋果日報 2021年6月23日" [ref=e35]:
          - generic [ref=e37]:
            - paragraph [ref=e39]: 《蘋果日報》創立於 1995 年，曾是香港其中一份最暢銷的中文報紙。2021 年，多名高層因政治原因被捕，香港政府以《港區國安法》凍結報館資金，迫使《蘋果日報》於 6 月 24 日凌晨停止營運。
            - separator [ref=e40]
            - generic [ref=e41]:
              - paragraph [ref=e42]: 《果靈》一名，由唐君毅先生的「花果飄零，靈根自植」演變而來。
              - paragraph [ref=e43]: 「果」是傳統中華文化，也是《蘋果日報》，更可以是香港人引以為傲的價值。
              - paragraph [ref=e44]: 昔日，先賢守護著傳統文化，靈根植於香港。如今，香港人的本土文化、抗爭精神隨政府打壓、疫情、移民潮被迫飄零。
              - paragraph [ref=e45]: 「靈」希望提醒香港人，我們並非失根的花果，我們的靈可以在每一個地方紮根，亦應該在每一顆心裏面生根發芽。
              - paragraph [ref=e46]: 《蘋果》雖死，但我們每個人都可以有一株小小的蘋果苗。
          - link "查閱所有文章" [ref=e48] [cursor=pointer]:
